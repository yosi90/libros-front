<section class="floating-window" [class.floating-window--minimized]="mode === 'minimized'" [class.floating-window--maximized]="mode === 'maximized'" [ngStyle]="frameStyle" role="dialog" [attr.aria-label]="title" (pointerdown)="focused.emit()" (pointermove)="onPointerMove($event)" (pointerup)="endInteraction($event)" (pointercancel)="endInteraction($event)">
    <header class="floating-window__header" tabindex="0" (pointerdown)="startMove($event)" (keydown)="moveByKeyboard($event)"><strong>{{title}}</strong><nav aria-label="Controles de ventana"><button type="button" *ngIf="allowMinimize || mode === 'minimized'" (pointerdown)="$event.stopPropagation()" (click)="toggleMinimized()" [attr.aria-label]="mode === 'minimized' ? 'Restaurar ventana' : 'Minimizar ventana'"><mat-icon>{{mode === 'minimized' ? 'open_in_full' : 'remove'}}</mat-icon></button><button type="button" *ngIf="mode !== 'minimized'" (pointerdown)="$event.stopPropagation()" (click)="toggleMaximized()" [attr.aria-label]="mode === 'maximized' ? 'Restaurar tamaño' : 'Maximizar ventana'"><mat-icon>{{mode === 'maximized' ? 'fullscreen_exit' : 'fullscreen'}}</mat-icon></button><button type="button" (pointerdown)="$event.stopPropagation()" (click)="closed.emit()" aria-label="Cerrar ventana"><mat-icon>close</mat-icon></button></nav></header>
    <main *ngIf="mode !== 'minimized'"><ng-content></ng-content></main>
    <button type="button" class="floating-window__resize" *ngIf="mode === 'window'" (pointerdown)="startResize($event)" aria-label="Redimensionar ventana"></button>
</section>
