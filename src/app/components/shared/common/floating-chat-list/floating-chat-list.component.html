<section class="floating-chat-list"><header><span>Conversaciones recientes</span><button type="button" (click)="refresh()" [disabled]="loading" aria-label="Actualizar chats"><mat-icon>refresh</mat-icon></button></header><p *ngIf="loading">Cargando conversaciones…</p><p class="floating-chat-list__error" *ngIf="error" role="alert">{{error}}</p><button type="button" *ngFor="let conversation of conversations" (click)="open(conversation)"><span class="floating-chat-list__icon"><mat-icon>{{icon(conversation)}}</mat-icon></span><span><strong>{{title(conversation)}}</strong><small>{{conversation.UltimoMensaje?.VistaPrevia || 'Sin mensajes aún'}}</small></span><b *ngIf="conversation.NoLeidos">{{conversation.NoLeidos > 99 ? '99+' : conversation.NoLeidos}}</b></button><p *ngIf="!loading && !error && !conversations.length">Aún no tienes conversaciones activas.</p></section>
