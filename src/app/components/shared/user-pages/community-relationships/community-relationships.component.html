<section class="community-relationships" [attr.aria-busy]="isLoading">
    <nav class="community-relationships__tabs" *ngIf="!blocksOnly" aria-label="Tipos de relación"><button type="button" *ngFor="let item of views" [class.is-active]="view === item.id" (click)="switchView(item.id)"><mat-icon>{{item.icon}}</mat-icon>{{item.label}}</button></nav>
    <p class="community-relationships__error" *ngIf="error" role="alert">{{error}}</p>
    <div class="community-relationships__state" *ngIf="isLoading" role="status" aria-live="polite"><mat-icon>hourglass_top</mat-icon>Cargando relaciones…</div>

    <section class="community-relationships__list" *ngIf="!isLoading && isRequestView">
        <article *ngFor="let request of requests"><span class="community-relationships__avatar"><mat-icon>person</mat-icon></span><a [routerLink]="['/dashboard/community/users', request.Usuario.Id]"><strong>{{request.Usuario.Nombre}}</strong><small>Solicitud enviada {{request.FechaCreacion | date:'dd/MM/yyyy'}}</small><em *ngIf="request.Mensaje">{{request.Mensaje}}</em></a><div class="community-relationships__actions" *ngIf="view === 'recibidas'"><button type="button" (click)="resolve(request, 'aceptada')" [disabled]="actionId !== null">Aceptar</button><button type="button" class="community-relationships__secondary" (click)="resolve(request, 'rechazada')" [disabled]="actionId !== null">Rechazar</button></div></article>
        <p class="community-relationships__empty" *ngIf="requests.length === 0">{{emptyMessage}}</p>
    </section>

    <section class="community-relationships__list" *ngIf="!isLoading && !isRequestView">
        <article *ngFor="let relationship of relationships"><span class="community-relationships__avatar"><mat-icon>person</mat-icon></span><a [routerLink]="['/dashboard/community/users', relationship.Usuario.Id]"><strong>{{relationship.Usuario.Nombre}}</strong><small>Desde {{relationship.FechaCreacion | date:'dd/MM/yyyy'}}</small></a><div class="community-relationships__actions" *ngIf="view === 'bloqueos'"><button type="button" (click)="unblock(relationship)" [disabled]="actionId !== null">Desbloquear</button></div></article>
        <p class="community-relationships__empty" *ngIf="relationships.length === 0">{{emptyMessage}}</p>
    </section>
    <button type="button" class="community-relationships__more" *ngIf="nextAfterId" (click)="loadMore()" [disabled]="isLoadingMore">{{isLoadingMore ? 'Cargando…' : 'Cargar más'}}</button>
</section>
