<section class="preference-card">
    <p class="preference-hint">Moderación y sistema permanecen activos dentro de la aplicación.</p>
    <div class="preference-loading" *ngIf="loading">Cargando preferencias…</div>
    <div class="notification-preferences" *ngIf="!loading">
        <div class="notification-preferences__row notification-preferences__labels"><span>Categoría</span><span>En la app</span><span class="notification-preferences__push-label">Push <mat-icon matTooltip="Las notificaciones push aparecen en tu dispositivo incluso si no tienes la web abierta. Debes activarlas para este navegador desde el botón inferior." matTooltipClass="tt-accent" aria-label="Información sobre notificaciones push">help_outline</mat-icon></span></div>
        <div class="notification-preferences__row" *ngFor="let category of categories"><strong>{{category.label}}</strong><button type="button" class="preference-switch preference-switch--compact" [class.is-on]="enabled(category.id, 'in_app')" [disabled]="!canChange(category.id, 'in_app') || saving" [attr.aria-pressed]="enabled(category.id, 'in_app')" [attr.aria-label]="category.label + ', en la aplicación'" (click)="toggle(category.id, 'in_app')"><i></i><b>Sí</b><em>No</em></button><button type="button" class="preference-switch preference-switch--compact" [class.is-on]="enabled(category.id, 'push')" [disabled]="saving" [attr.aria-pressed]="enabled(category.id, 'push')" [attr.aria-label]="category.label + ', push'" (click)="toggle(category.id, 'push')"><i></i><b>Sí</b><em>No</em></button></div>
    </div>
    <div class="preference-actions"><button type="button" class="preference-secondary" *ngIf="push.supported" (click)="enablePush()" [disabled]="activatingPush">{{activatingPush ? 'Activando…' : 'Activar push en este dispositivo'}}</button><button type="button" class="preference-save" (click)="save()" [disabled]="loading || saving">{{saving ? 'Guardando…' : 'Guardar notificaciones'}}</button></div>
</section>
