<section class="social-summary" [attr.aria-busy]="loading">
    <header><div><span>Tu espacio social</span><h1>Resumen</h1><p>Relaciones, clubes y conversaciones que requieren tu atención.</p></div><button type="button" (click)="load()" [disabled]="loading"><mat-icon>refresh</mat-icon>Actualizar</button></header>
    <p class="social-summary__partial" *ngIf="summary?.Parcial" role="status"><mat-icon>info</mat-icon>Parte del resumen no está disponible ahora mismo. El resto continúa operativo.</p>
    <div class="social-summary__state" *ngIf="loading"><mat-icon>hourglass_top</mat-icon>Cargando resumen…</div>
    <div class="social-summary__state social-summary__state--error" *ngIf="!loading && error" role="alert"><mat-icon>cloud_off</mat-icon>{{error}}<button type="button" (click)="load()">Reintentar</button></div>
    <div class="social-summary__grid" *ngIf="!loading && !error">
        <a *ngFor="let card of cards; trackBy: trackCard" [routerLink]="card.path" [class.has-pending]="card.accent"><mat-icon>{{card.icon}}</mat-icon><span><strong>{{card.value}}</strong><small>{{card.label}}</small></span><mat-icon>chevron_right</mat-icon></a>
    </div>
</section>
