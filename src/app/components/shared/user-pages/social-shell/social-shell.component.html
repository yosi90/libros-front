<section class="social-shell">
    <aside class="social-shell__navigation">
        <header><mat-icon>hub</mat-icon><div><strong>Social</strong><small>Comunidad lectora</small></div></header>
        <nav aria-label="Secciones sociales">
            <a *ngFor="let item of items" [routerLink]="item.path" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }" [class.is-disabled]="!isAvailable(item)" [attr.aria-disabled]="!isAvailable(item)" [attr.tabindex]="isAvailable(item) ? 0 : -1">
                <mat-icon>{{item.icon}}</mat-icon><span><strong>{{item.label}}</strong></span>
            </a>
        </nav>
        <footer class="social-shell__counters" aria-label="Resumen de mensajes y amistades">
            <span><small>Amigos</small><strong>{{friendshipsCount}}</strong></span>
            <span><small>No leídos</small><strong>{{unreadCount}}</strong></span>
        </footer>
    </aside>
    <main class="social-shell__content"><router-outlet></router-outlet></main>
</section>
