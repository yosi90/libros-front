<div class="h-100 p-3">
    <mat-card class="p-3">
        <form [formGroup]="fgForgotPassword" (ngSubmit)="requestReset()">
            <h1>Recuperar contraseña</h1>
            <p>Indica el correo de tu cuenta y revisa tu bandeja de entrada.</p>
            <mat-form-field appearance="outline" class="w-100 mb-3">
                <mat-label class="ms-3">Correo electrónico</mat-label>
                <input matInput class="ms-3" placeholder="LeoLibros@gmail.com" formControlName="email"
                    (blur)="updateEmailErrorMessage()" required maxlength="30" tabindex="1">
                <mat-icon matTextPrefix>email</mat-icon>
                @if (email.invalid) {
                <mat-error align="start">{{errorEmailMessage}}</mat-error>
                }
                <mat-hint align="end">{{ email.value ? email.value.length : 0 }} / 30</mat-hint>
            </mat-form-field>
            <div class="actions">
                <h5 [routerLink]="['/login']">Volver a iniciar sesión</h5>
                <button mat-raised-button type="submit" [disabled]="fgForgotPassword.invalid">
                    Enviar instrucciones
                    <mat-icon>mark_email_read</mat-icon>
                </button>
            </div>
        </form>
    </mat-card>
</div>
