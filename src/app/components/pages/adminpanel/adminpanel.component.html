<section class="admin-panel">
    <aside class="admin-menu" aria-label="Secciones de administración">
        <button
            type="button"
            class="admin-menu__item"
            *ngFor="let section of sections"
            [class.admin-menu__item--active]="activeSection === section.id"
            (click)="setActiveSection(section.id)">
            <mat-icon>{{section.icon}}</mat-icon>
            <span>
                <strong>{{section.title}}</strong>
                <small>{{section.description}}</small>
            </span>
        </button>
    </aside>

    <main class="admin-content">
        <ng-container [ngSwitch]="activeSection">
            <app-all-users *ngSwitchCase="'users'"></app-all-users>
            <app-catalog-moderation *ngSwitchCase="'catalogRequests'" view="requests"></app-catalog-moderation>
            <app-catalog-moderation *ngSwitchCase="'reviewReports'" view="reports"></app-catalog-moderation>
            <app-moderation-admin *ngSwitchCase="'moderation'"></app-moderation-admin>
            <app-operational-metrics *ngSwitchCase="'operations'"></app-operational-metrics>
            <app-all-books *ngSwitchCase="'books'"></app-all-books>
        </ng-container>
    </main>
</section>
