<section class="home p-3">
    @if (apiHealth$ | async; as apiHealth) {
        <div
            class="api-status"
            [ngClass]="'api-status--' + apiHealth.state"
            [attr.aria-label]="apiHealth.label + ': ' + apiHealth.detail"
            [attr.title]="apiHealth.label + ': ' + apiHealth.detail">
            <span class="api-status__light" aria-hidden="true"></span>
            <span class="api-status__text">API</span>
        </div>
    }

    <a class="nav-link text-uppercase" routerLink="/register">
        <mat-card>
            <mat-card-content style="background-image: url('../../../../../../assets/media/img/bibliotecaria.png');"></mat-card-content>
            <mat-card-footer>
                <p class="text-white">Date de alta</p>
            </mat-card-footer>
        </mat-card>
    </a>
    <a class="nav-link text-uppercase" routerLink="/login">
        <mat-card>
            <mat-card-content style="background-image: url('../../../../../../assets/media/img/biblioteca.png');"></mat-card-content>
            <mat-card-footer>
                <p class="text-white">Inicia sesión</p>
            </mat-card-footer>
        </mat-card>
    </a>
</section>
