<div class="h-100 p-3">
    <mat-card class="p-3">
        <form [formGroup]="fgResetPassword" (ngSubmit)="confirmReset()">
            <h1>Nueva contraseña</h1>
            <mat-form-field appearance="outline" class="w-100 mb-3">
                <mat-label class="ms-3">Contraseña</mat-label>
                <input matInput class="ms-3" [type]="passHide ? 'password' : 'text'" formControlName="password"
                    (blur)="updatePassErrorMessage()" required maxlength="30" tabindex="1">
                <mat-icon matTextPrefix>password</mat-icon>
                <button type="button" mat-icon-button matSuffix (click)="passHide = !passHide"
                    [attr.aria-label]="'Esconder contraseña'" [attr.aria-pressed]="passHide">
                    <mat-icon>{{passHide ? 'visibility_off' : 'visibility'}}</mat-icon>
                </button>
                @if (password.invalid) {
                <mat-error class="password-error">{{errorPassMessage}}</mat-error>
                }
                <mat-hint align="end">{{ password.value ? password.value.length : 0 }} / 30</mat-hint>
            </mat-form-field>
            <mat-form-field appearance="outline" class="w-100 mb-3">
                <mat-label class="ms-3">Repite la contraseña</mat-label>
                <input matInput class="ms-3" [type]="passRepeatHide ? 'password' : 'text'" formControlName="passwordRepeat"
                    (blur)="updatePasswordRepeatErrorMessage()" required maxlength="30" tabindex="2">
                <mat-icon matTextPrefix>password</mat-icon>
                <button type="button" mat-icon-button matSuffix (click)="passRepeatHide = !passRepeatHide"
                    [attr.aria-label]="'Esconder contraseña'" [attr.aria-pressed]="passRepeatHide">
                    <mat-icon>{{passRepeatHide ? 'visibility_off' : 'visibility'}}</mat-icon>
                </button>
                @if (errorPassRepeatMessage) {
                <mat-error>{{errorPassRepeatMessage}}</mat-error>
                }
            </mat-form-field>
            <div class="actions">
                <h5 [routerLink]="['/login']">Volver a iniciar sesión</h5>
                <button mat-raised-button type="submit" [disabled]="fgResetPassword.invalid || !passwordsMatch() || !token">
                    Actualizar contraseña
                    <mat-icon>lock_reset</mat-icon>
                </button>
            </div>
        </form>
    </mat-card>
</div>
