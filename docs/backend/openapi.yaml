              Clubes: {type: object, required: [Activos, InvitacionesPendientes], properties: {Activos: {type: integer, minimum: 0}, InvitacionesPendientes: {type: integer, minimum: 0}}}
              Mensajes: {type: object, required: [NoLeidos, NoLeidosHumanos, NoLeidosSistema], properties: {NoLeidos: {type: integer, minimum: 0}, NoLeidosHumanos: {type: integer, minimum: 0}, NoLeidosSistema: {type: integer, minimum: 0}}}
