  schemas:
    ActivityPreferences:
      type: object
      required: [CompartirEstado, CompartirPuntuacion, CompartirResena, Reconocimientos, AudienciaPredeterminada]
      properties:
        CompartirEstado: {type: boolean}
        CompartirPuntuacion: {type: boolean}
        CompartirResena: {type: boolean}
        Reconocimientos: {$ref: '#/components/schemas/ActivityRecognitions'}
        AudienciaPredeterminada: {type: string, enum: [publico, seguidores, amigos], default: seguidores, description: 'Para una cuenta sin preferencias persistidas, GET devuelve seguidores. Una preferencia guardada solo cambia mediante PUT.'}
    ActivityRecognitions:
      type: object
      additionalProperties: false
      required: [Estado, Puntuacion, Resena]
      properties: {Estado: {type: boolean, default: false}, Puntuacion: {type: boolean, default: false}, Resena: {type: boolean, default: false}}
    ActivityAcknowledgementResponse:
      allOf:
      - $ref: '#/components/schemas/SuccessResponse'
      - type: object
        required: [Categoria, Reconocimientos]
        properties: {Categoria: {type: string, enum: [estado, puntuacion, resena]}, Reconocimientos: {$ref: '#/components/schemas/ActivityRecognitions'}}
    ActivityPreferencesResponse:
      allOf:
      - $ref: '#/components/schemas/SuccessResponse'
      - type: object
        required: [Preferencias]
        properties: {Preferencias: {$ref: '#/components/schemas/ActivityPreferences'}}
    SuccessResponse:
      type: object
      required: [success]
      properties:
        success: {type: boolean, const: true}
    UserSummary:
      type: object
      required: [Id, Nombre]
      properties:
        Id: {type: integer}
        Nombre: {type: string}
        Imagen: {type: [string, 'null']}
    NotificationContextNone: {type: object, additionalProperties: false, example: {}}
    NotificationContextClub: {type: object, additionalProperties: false, required: [ClubId], properties: {ClubId: {type: integer, minimum: 1}}, example: {ClubId: 42}}
    NotificationContextRelationships: {type: object, additionalProperties: false, required: [Estado], properties: {Estado: {type: string}}, example: {Estado: aceptada}}
    NotificationContextCatalogRequest: {type: object, additionalProperties: false, required: [Id, Estado, Destino], properties: {Id: {type: integer, minimum: 1}, Estado: {type: string, enum: [pendiente, devuelta, aprobada, rechazada]}, Destino: {type: string, enum: [propio, cola_catalogo]}}, example: {Id: 12, Estado: pendiente, Destino: cola_catalogo}}
    NotificationContextReviewReport: {type: object, additionalProperties: false, required: [GrupoId, Estado, Destino], properties: {GrupoId: {type: integer, minimum: 1}, Estado: {type: string, enum: [pendiente, aceptado, rechazado]}, Destino: {type: string, enum: [propio, cola_reportes]}}, example: {GrupoId: 8, Estado: pendiente, Destino: cola_reportes}}
    NotificationContextCommunityModeration: {type: object, additionalProperties: false, required: [GrupoId, Estado, TipoEntidad, EntidadId, Destino], properties: {GrupoId: {type: integer, minimum: 1}, Estado: {type: string, enum: [pendiente, aceptada, rechazada]}, TipoEntidad: {type: string, enum: [publicacion, comentario, perfil, mensaje, club]}, EntidadId: {type: integer, minimum: 1}, Destino: {type: string, enum: [propio, cola_denuncias_comunidad]}}, example: {GrupoId: 6, Estado: pendiente, TipoEntidad: publicacion, EntidadId: 71, Destino: cola_denuncias_comunidad}}
    NotificationContextModerationAppeal: {type: object, additionalProperties: false, required: [AlegacionId, SancionId, Estado, Destino], properties: {AlegacionId: {type: integer, minimum: 1}, SancionId: {type: integer, minimum: 1}, Estado: {type: string, enum: [pendiente, en_revision, aceptada, rechazada]}, Destino: {type: string, enum: [propio, cola_alegaciones]}}, example: {AlegacionId: 4, SancionId: 19, Estado: pendiente, Destino: cola_alegaciones}}
    NotificationContextChatConversation: {type: object, additionalProperties: false, required: [ConversacionId], properties: {ConversacionId: {type: integer, minimum: 1}, MensajeId: {type: integer, minimum: 1}}, example: {ConversacionId: 31, MensajeId: 606}}
    NotificationContextFeedPublication: {type: object, additionalProperties: false, required: [PublicacionId], properties: {PublicacionId: {type: integer, minimum: 1}, ComentarioId: {type: integer, minimum: 1}}, example: {PublicacionId: 77, ComentarioId: 92}}
    NotificationContextUserProfile: {type: object, additionalProperties: false, required: [UsuarioId], properties: {UsuarioId: {type: integer, minimum: 1}}, example: {UsuarioId: 23}}
    Notification:
      description: El destino se resuelve solo con `ContextoTipo`, `Contexto.Destino` e identificadores tipados. Si el recurso fue eliminado, bloqueado, sancionado o ya no es accesible, el cliente conserva la notificación y muestra un destino no disponible; nunca usa una URL recibida. Los avisos operativos se deduplican por destinatario, entidad, transición y código.
      allOf:
      - type: object
        required: [Id, Codigo, Categoria, Titulo, FechaCreacion]
        properties:
          Id: {type: integer}
          Codigo: {type: string}
          Categoria: {type: string, enum: [amistades, seguimiento, feed, chat, clubes, moderacion, sistema]}
          Titulo: {type: string}
          Cuerpo: {type: [string, 'null']}
          ConversationId: {type: [integer, 'null'], description: 'Conversación personal de sistema correlacionada, si existe.'}
          MessageId: {type: [integer, 'null'], description: 'Mensaje de sistema correlacionado, si existe.'}
          ActorId: {type: [integer, 'null']}
          FechaCreacion: {type: string, format: date-time}
          FechaLectura: {type: [string, 'null'], format: date-time}
      - oneOf:
        - {type: object, required: [ContextoTipo, Contexto], properties: {ContextoTipo: {const: none}, Contexto: {$ref: '#/components/schemas/NotificationContextNone'}}}
        - {type: object, required: [ContextoTipo, Contexto], properties: {ContextoTipo: {const: club}, Contexto: {$ref: '#/components/schemas/NotificationContextClub'}}}
        - {type: object, required: [ContextoTipo, Contexto], properties: {ContextoTipo: {const: relationships}, Contexto: {$ref: '#/components/schemas/NotificationContextRelationships'}}}
        - {type: object, required: [ContextoTipo, Contexto], properties: {ContextoTipo: {const: catalog_request}, Contexto: {$ref: '#/components/schemas/NotificationContextCatalogRequest'}}}
        - {type: object, required: [ContextoTipo, Contexto], properties: {ContextoTipo: {const: review_report}, Contexto: {$ref: '#/components/schemas/NotificationContextReviewReport'}}}
        - {type: object, required: [ContextoTipo, Contexto], properties: {ContextoTipo: {const: community_moderation}, Contexto: {$ref: '#/components/schemas/NotificationContextCommunityModeration'}}}
        - {type: object, required: [ContextoTipo, Contexto], properties: {ContextoTipo: {const: moderation_appeal}, Contexto: {$ref: '#/components/schemas/NotificationContextModerationAppeal'}}}
        - {type: object, required: [ContextoTipo, Contexto], properties: {ContextoTipo: {const: chat_conversation}, Contexto: {$ref: '#/components/schemas/NotificationContextChatConversation'}}}
        - {type: object, required: [ContextoTipo, Contexto], properties: {ContextoTipo: {const: feed_publication}, Contexto: {$ref: '#/components/schemas/NotificationContextFeedPublication'}}}
        - {type: object, required: [ContextoTipo, Contexto], properties: {ContextoTipo: {const: user_profile}, Contexto: {$ref: '#/components/schemas/NotificationContextUserProfile'}}}
    NotificationListResponse:
      allOf:
      - $ref: '#/components/schemas/SuccessResponse'
      - type: object
        required: [Notificaciones, NoLeidas, SiguienteCursor]
        properties:
          Notificaciones: {type: array, items: {$ref: '#/components/schemas/Notification'}}
