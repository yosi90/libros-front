openapi: 3.1.0
info:
  title: Libros API
  version: 1.0.0
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
  description: 'API Flask para gestionar lectura de libros y entidades relacionadas.

    En personajes, Nombre es contextual: libros sin saga usan orden -1 y libros/secciones de saga usan OrdenEnSagas.

    Al consultar un libro posterior de saga, la API puede crear el nombre contextual copiando el apodo principal anterior
    mas reciente.

    Validaciones comunes: nombres generales minimo 2 y maximo 100; descripciones generales minimo 15.

    Las entidades con entradas son personajes, localizaciones, organizaciones, conceptos, eventos y citas.

    Una escena valida requiere entrada valida, localizacion valida y al menos un personaje en escena; personajes solo nombrados
    no bastan.

    '
servers:
- url: https://libros-api.yosiftware.es
  description: Produccion por Cloudflare Tunnel
- url: http://127.0.0.1:5001
  description: Local
security:
- bearerAuth: []
