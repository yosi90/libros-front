components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    EmailQuery:
      name: email
      in: query
      required: true
      schema:
        type: string
        format: email
    IdAutor:
      name: id_autor
      in: path
      required: true
      schema:
        type: integer
    IdUniverso:
      name: id_universo
      in: path
      required: true
      schema:
        type: integer
    IdSaga:
