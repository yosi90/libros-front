openapi: 3.1.0
info:
  title: Libros API
  version: 1.0.0
  description: |
    API Flask para gestionar lectura de libros y entidades relacionadas.
    En personajes, Nombre es contextual: libros sin saga usan orden -1 y libros/secciones de saga usan OrdenEnSagas.
    Al consultar un libro posterior de saga, la API puede crear el nombre contextual copiando el apodo principal anterior mas reciente.
    Validaciones comunes: nombres generales minimo 2 y maximo 100; descripciones generales minimo 15.
    Las entidades con entradas son personajes, localizaciones, organizaciones, conceptos, eventos y citas.
    Una escena valida requiere entrada valida, localizacion valida y al menos un personaje en escena; personajes solo nombrados no bastan.
servers:
  - url: https://libros-api.yosiftware.es
    description: Produccion por Cloudflare Tunnel
  - url: http://localhost:5001
    description: Local
security:
  - bearerAuth: []
tags:
  - name: Health
  - name: Auth
  - name: Autores
  - name: Universos
  - name: Sagas
  - name: Libros
  - name: Antologias
  - name: Secciones
  - name: Personajes
  - name: Entradas
  - name: Localizaciones
  - name: Conceptos
  - name: Organizaciones
  - name: Eventos
  - name: Citas
  - name: Escenas
  - name: Estados
  - name: EstadoLocalizacion
  - name: Notas
  - name: Imagenes
paths:
  /verify:
    get:
      tags: [Health]
      summary: Verifica conexion con SQL Server
      security: []
      responses:
        "200":
          description: Conexion correcta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthOk"
        "503":
          description: La API no puede conectar con SQL Server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthError"
  /auth:
    post:
      tags: [Auth]
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login correcto
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/email:
    get:
      tags: [Auth]
      summary: Comprueba si existe un email
      security: []
      parameters:
        - $ref: "#/components/parameters/EmailQuery"
      responses:
        "200":
          description: Resultado de existencia
          content:
            application/json:
              schema:
                type: object
                properties:
                  existe:
                    type: boolean
  /auth/register:
    post:
      tags: [Auth]
      summary: Registra usuario
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Usuario registrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /auth/registeradmin:
    post:
      tags: [Auth]
      summary: Registra usuario administrador
      description: Requiere JWT de administrador. No es una ruta publica.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Administrador registrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "403":
          $ref: "#/components/responses/Unauthorized"
  /auth/user:
    get:
      tags: [Auth]
      summary: Devuelve usuario autenticado
      responses:
        "200":
          description: Usuario autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /user:
    get:
      tags: [Auth]
      summary: Alias compatible de /auth/user
      responses:
        "200":
          description: Usuario autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/password-reset/request:
    post:
      tags: [Auth]
      summary: Solicita email de recuperacion de contrasena
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequest"
      responses:
        "200":
          description: Respuesta generica para evitar enumeracion de usuarios
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "500":
          description: Fallo de envio por Brevo API o SMTP fallback si el usuario existe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /auth/password-reset/confirm:
    post:
      tags: [Auth]
      summary: Cambia contrasena usando token de recuperacion
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetConfirmRequest"
      responses:
        "200":
          description: Contrasena actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResetConfirmResponse"
        "400":
          description: Token invalido, expirado, usado o password invalida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /auth/update:
    put:
      tags: [Auth]
      summary: Actualiza usuario autenticado
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateRequest"
      responses:
        "200":
          $ref: "#/components/responses/Message"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/refresh-token:
    get:
      tags: [Auth]
      summary: Refresca access token
      description: Requiere refresh token Bearer.
      responses:
        "200":
          description: Tokens renovados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
  /autores:
    get:
      tags: [Autores]
      summary: Lista autores
      responses:
        "200":
          $ref: "#/components/responses/AuthorList"
    post:
      tags: [Autores]
      summary: Crea autor
      requestBody:
        $ref: "#/components/requestBodies/AuthorWrite"
      responses:
        "201":
          $ref: "#/components/responses/Author"
    patch:
      tags: [Autores]
      summary: Actualiza autor
      requestBody:
        $ref: "#/components/requestBodies/AuthorWrite"
      responses:
        "200":
          $ref: "#/components/responses/Author"
  /autores/{id_autor}:
    get:
      tags: [Autores]
      summary: Detalle de autor
      parameters:
        - $ref: "#/components/parameters/IdAutor"
      responses:
        "200":
          $ref: "#/components/responses/Author"
  /universos:
    get:
      tags: [Universos]
      summary: Lista universos con relaciones
      responses:
        "200":
          description: Lista de universos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Universe"
    post:
      tags: [Universos]
      summary: Crea universo
      requestBody:
        $ref: "#/components/requestBodies/UniverseWrite"
      responses:
        "201":
          description: Universo creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Universe"
    patch:
      tags: [Universos]
      summary: Actualiza universo
      requestBody:
        $ref: "#/components/requestBodies/UniverseWrite"
      responses:
        "200":
          description: Universo actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Universe"
  /universos/{id_universo}:
    get:
      tags: [Universos]
      summary: Detalle de universo
      parameters:
        - $ref: "#/components/parameters/IdUniverso"
      responses:
        "200":
          description: Universo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Universe"
  /sagas:
    get:
      tags: [Sagas]
      summary: Lista sagas
      responses:
        "200":
          description: Lista de sagas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Saga"
    post:
      tags: [Sagas]
      summary: Crea saga
      requestBody:
        $ref: "#/components/requestBodies/SagaWrite"
      responses:
        "201":
          description: Saga creada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Saga"
    patch:
      tags: [Sagas]
      summary: Actualiza saga
      requestBody:
        $ref: "#/components/requestBodies/SagaWrite"
      responses:
        "200":
          description: Saga actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Saga"
  /sagas/{id_saga}:
    get:
      tags: [Sagas]
      summary: Detalle de saga
      parameters:
        - $ref: "#/components/parameters/IdSaga"
      responses:
        "200":
          description: Saga
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Saga"
  /libros:
    get:
      tags: [Libros]
      summary: Lista libros
      responses:
        "200":
          description: Lista de libros
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BookSummary"
    post:
      tags: [Libros]
      summary: Crea libro
      requestBody:
        $ref: "#/components/requestBodies/BookWriteFlexible"
      responses:
        "201":
          description: Libro creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookSummary"
    patch:
      tags: [Libros]
      summary: Actualiza libro
      description: Si cambia entre autoconclusivo y saga, migra entidades narrativas propias del libro entre tablas libro_* y saga_*. Al sacar un libro de una saga, solo migra filas cuyo id_libro_origen sea ese libro; no arrastra entidades heredadas.
      requestBody:
        $ref: "#/components/requestBodies/BookWriteFlexible"
      responses:
        "200":
          description: Libro actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookSummary"
  /libros/{id_libro}:
    get:
      tags: [Libros]
      summary: Detalle completo de libro
      parameters:
        - $ref: "#/components/parameters/IdLibro"
      responses:
        "200":
          description: Libro completo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookDetail"
  /libros/wiki:
    patch:
      tags: [Libros]
      summary: Actualiza wiki de libro
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [Id, Wiki]
              properties:
                Id:
                  type: integer
                Wiki:
                  type: string
      responses:
        "200":
          $ref: "#/components/responses/Message"
  /libros/leidos:
    get:
      tags: [Libros]
      summary: Cuenta libros leidos
      responses:
        "200":
          $ref: "#/components/responses/MetricObject"
  /libros/no_leidos:
    get:
      tags: [Libros]
      summary: Cuenta libros no leidos
      responses:
        "200":
          $ref: "#/components/responses/MetricObject"
  /libros/sin_leer:
    get:
      tags: [Libros]
      summary: Libro con mas tiempo sin leer
      responses:
        "200":
          description: Libro o null
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: "#/components/schemas/BookStale"
                  - type: "null"
  /libros/por_comprar:
    get:
      tags: [Libros]
      summary: Libros por comprar
      responses:
        "200":
          description: Lista de libros
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IdName"
  /libros/mas_rapido:
    get:
      tags: [Libros]
      summary: Libro leido mas rapido
      responses:
        "200":
          description: Libro o null
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: "#/components/schemas/FastRead"
                  - type: "null"
  /libros/top_mas_rapido:
    get:
      tags: [Libros]
      summary: Top libros leidos mas rapido
      responses:
        "200":
          description: Lista top
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FastRead"
  /libros/historial_leidos:
    get:
      tags: [Libros]
      summary: Historial mensual de libros leidos
      responses:
        "200":
          description: Historial
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyCount"
  /libros/promedio_compra_lectura:
    get:
      tags: [Libros]
      summary: Promedio dias entre compra y lectura
      responses:
        "200":
          description: Promedio
          content:
            application/json:
              schema:
                type: object
                properties:
                  promedio_dias:
                    type:
                      - number
                      - "null"
  /antologias:
    get:
      tags: [Antologias]
      summary: Lista antologias
      responses:
        "200":
          description: Lista de antologias
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Anthology"
    post:
      tags: [Antologias]
      summary: Crea antologia
      requestBody:
        $ref: "#/components/requestBodies/AnthologyWriteFlexible"
      responses:
        "201":
          description: Antologia creada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Anthology"
    patch:
      tags: [Antologias]
      summary: Actualiza antologia
      requestBody:
        $ref: "#/components/requestBodies/AnthologyWriteFlexible"
      responses:
        "200":
          description: Antologia actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Anthology"
  /antologias/{id_antologia}:
    get:
      tags: [Antologias]
      summary: Detalle de antologia
      parameters:
        - $ref: "#/components/parameters/IdAntologia"
      responses:
        "200":
          description: Antologia
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Anthology"
  /antologias/leidos:
    get:
      tags: [Antologias]
      summary: Cuenta antologias leidas
      responses:
        "200":
          $ref: "#/components/responses/MetricObject"
  /antologias/no_leidos:
    get:
      tags: [Antologias]
      summary: Cuenta antologias no leidas
      responses:
        "200":
          $ref: "#/components/responses/MetricObject"
  /antologias/secciones/leidas:
    get:
      tags: [Antologias]
      summary: Cuenta secciones leidas
      responses:
        "200":
          $ref: "#/components/responses/MetricObject"
  /antologias/secciones:
    post:
      tags: [Antologias]
      summary: Crea seccion de antologia
      requestBody:
        $ref: "#/components/requestBodies/AnthologySectionWrite"
      responses:
        "201":
          description: Seccion creada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlexibleObject"
    patch:
      tags: [Antologias]
      summary: Actualiza paginas de seccion de antologia
      requestBody:
        $ref: "#/components/requestBodies/AnthologySectionWrite"
      responses:
        "200":
          description: Seccion actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlexibleObject"
  /antologias/secciones/{id_libro}:
    get:
      tags: [Antologias]
      summary: Detalle de seccion de antologia
      parameters:
        - $ref: "#/components/parameters/IdLibro"
      responses:
        "200":
          description: Seccion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlexibleObject"
  /secciones/universo/{id_universo}:
    get:
      tags: [Secciones]
      summary: Lista secciones de universo
      parameters:
        - $ref: "#/components/parameters/IdUniverso"
      responses:
        "200":
          $ref: "#/components/responses/FlexibleList"
  /secciones/universo/{id_universo}/{id_libro}:
    get:
      tags: [Secciones]
      summary: Detalle seccion de universo
      parameters:
        - $ref: "#/components/parameters/IdUniverso"
        - $ref: "#/components/parameters/IdLibro"
      responses:
        "200":
          $ref: "#/components/responses/FlexibleObject"
    delete:
      tags: [Secciones]
      summary: Elimina seccion de universo
      parameters:
        - $ref: "#/components/parameters/IdUniverso"
        - $ref: "#/components/parameters/IdLibro"
      responses:
        "200":
          $ref: "#/components/responses/Deleted"
  /secciones/universo:
    post:
      tags: [Secciones]
      summary: Crea seccion de universo
      requestBody:
        $ref: "#/components/requestBodies/UniverseSectionWrite"
      responses:
        "201":
          $ref: "#/components/responses/FlexibleObject"
  /secciones/saga/{id_saga}:
    get:
      tags: [Secciones]
      summary: Lista secciones de saga
      parameters:
        - $ref: "#/components/parameters/IdSaga"
      responses:
        "200":
          $ref: "#/components/responses/FlexibleList"
  /secciones/saga/{id_saga}/{id_libro}:
    get:
      tags: [Secciones]
      summary: Detalle seccion de saga
      parameters:
        - $ref: "#/components/parameters/IdSaga"
        - $ref: "#/components/parameters/IdLibro"
      responses:
        "200":
          $ref: "#/components/responses/FlexibleObject"
    delete:
      tags: [Secciones]
      summary: Elimina seccion de saga
      parameters:
        - $ref: "#/components/parameters/IdSaga"
        - $ref: "#/components/parameters/IdLibro"
      responses:
        "200":
          $ref: "#/components/responses/Deleted"
  /secciones/saga:
    post:
      tags: [Secciones]
      summary: Crea seccion de saga
      requestBody:
        $ref: "#/components/requestBodies/SagaSectionWrite"
      responses:
        "201":
          $ref: "#/components/responses/FlexibleObject"
    patch:
      tags: [Secciones]
      summary: Actualiza orden de seccion de saga
      requestBody:
        $ref: "#/components/requestBodies/SagaSectionWrite"
      responses:
        "200":
          $ref: "#/components/responses/FlexibleObject"
  /personajes:
    post:
      tags: [Personajes]
      summary: Crea personaje y lo asocia a un libro
      requestBody:
        $ref: "#/components/requestBodies/CharacterCreate"
      responses:
        "201":
          description: Personaje creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
        "400":
          $ref: "#/components/responses/Message"
        "403":
          $ref: "#/components/responses/Unauthorized"
  /personajes/{id_personaje}:
    get:
      tags: [Personajes]
      summary: Detalle de personaje en contexto opcional de libro
      parameters:
        - $ref: "#/components/parameters/IdPersonaje"
        - name: libroId
          in: query
          required: false
          schema:
            type: integer
          description: Si se envia, Nombre se resuelve como apodo contextual para ese libro/saga.
      responses:
        "200":
          description: Personaje
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
        "404":
          $ref: "#/components/responses/Message"
  /personajes/{id_personaje}/apodos:
    get:
      tags: [Personajes]
      summary: Lista apodos conocidos del personaje
      parameters:
        - $ref: "#/components/parameters/IdPersonaje"
        - name: includeDeleted
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Apodos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CharacterAlias"
    post:
      tags: [Personajes]
      summary: Crea o reutiliza un apodo conocido del personaje
      description: No cambia el Nombre contextual visible; solo gestiona la lista de apodos conocidos.
      parameters:
        - $ref: "#/components/parameters/IdPersonaje"
      requestBody:
        $ref: "#/components/requestBodies/CharacterBookAlias"
      responses:
        "201":
          description: Apodo creado o reactivado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterAlias"
        "403":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/Message"
  /personajes/{id_personaje}/apodos/{id_apodo}:
    put:
      tags: [Personajes]
      summary: Corrige un apodo conocido del personaje
      description: No renombra apodos; crea o reutiliza el apodo correcto, repunta personaje_apodos y actualiza los personaje_nombre de ese personaje que usaban el apodo anterior.
      parameters:
        - $ref: "#/components/parameters/IdPersonaje"
        - $ref: "#/components/parameters/IdApodo"
      requestBody:
        $ref: "#/components/requestBodies/CharacterAliasUpdate"
      responses:
        "200":
          description: Apodo actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterAlias"
        "403":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/Message"
    delete:
      tags: [Personajes]
      summary: Borra logicamente un apodo conocido del personaje
      description: Marca personaje_apodos.borrado = 1. Devuelve 409 si el apodo se usa como nombre contextual.
      parameters:
        - $ref: "#/components/parameters/IdPersonaje"
        - $ref: "#/components/parameters/IdApodo"
      responses:
        "200":
          $ref: "#/components/responses/Message"
        "403":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/Message"
        "409":
          $ref: "#/components/responses/Message"
  /personajes/{id_personaje}/estados:
    get:
      tags: [Personajes]
      summary: Lista estados del personaje
      description: Si se envia libroId, materializa el estado faltante del contexto y devuelve estados visibles hasta ese orden.
      parameters:
        - $ref: "#/components/parameters/IdPersonaje"
        - name: libroId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Estados del personaje
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CharacterState"
        "404":
          $ref: "#/components/responses/Message"
    post:
      tags: [Personajes]
      summary: Crea estado contextual del personaje
      parameters:
        - $ref: "#/components/parameters/IdPersonaje"
      requestBody:
        $ref: "#/components/requestBodies/CharacterStateWrite"
      responses:
        "201":
          description: Estado creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterState"
        "403":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/Message"
        "409":
          $ref: "#/components/responses/Message"
  /personajes/{id_personaje}/estados/libros/{id_libro}:
    put:
      tags: [Personajes]
      summary: Actualiza estado contextual del personaje en un libro
      description: Si no existe estado para ese origen, lo crea.
      parameters:
