      content:
        application/json:
          schema:
            $ref: '#/components/schemas/FlexibleObject'
    Forbidden:
      description: Token valido pero sin rol suficiente
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/FlexibleObject'
    Conflict:
      description: Conflicto de estado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/FlexibleObject'
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/FlexibleObject'
