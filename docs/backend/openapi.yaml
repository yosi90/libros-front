components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    EmailQuery:
      name: email
      in: query
      required: true
      schema:
        type: string
        format: email
    IdAutor:
      name: id_autor
      in: path
      required: true
      schema:
        type: integer
    IdUniverso:
      name: id_universo
      in: path
      required: true
      schema:
        type: integer
    IdSaga:
      name: id_saga
      in: path
      required: true
      schema:
        type: integer
    IdLibro:
      name: id_libro
      in: path
      required: true
      schema:
        type: integer
    IdPersonaje:
      name: id_personaje
      in: path
      required: true
      schema:
        type: integer
    IdOrganizacion:
      name: id_organizacion
      in: path
      required: true
      schema:
        type: integer
    IdLocalizacion:
      name: id_localizacion
      in: path
      required: true
      schema:
        type: integer
    IdConcepto:
      name: id_concepto
      in: path
      required: true
      schema:
        type: integer
    IdEvento:
      name: id_evento
      in: path
      required: true
      schema:
        type: integer
    IdCita:
      name: id_cita
      in: path
      required: true
      schema:
        type: integer
    IdApodo:
      name: id_apodo
      in: path
      required: true
      schema:
        type: integer
    IdRelacionPersonaje:
      name: id_relacion
      in: path
      required: true
      schema:
        type: integer
    IdAntologia:
      name: id_antologia
      in: path
      required: true
      schema:
        type: integer
    IdEstadoHistorico:
      name: id_estado_historico
      in: path
      required: true
      schema:
        type: integer
    IdPeticionCatalogo:
      name: id_peticion
      in: path
      required: true
      schema:
        type: integer
    IdGrupoReporte:
      name: id_grupo
      in: path
      required: true
      schema:
        type: integer
    CatalogQuery:
      name: q
      in: query
      required: false
      schema:
        type: string
    CatalogAuthorId:
      name: autorId
      in: query
      required: false
      schema:
        type: integer
    CatalogUniverseId:
      name: universoId
      in: query
      required: false
      schema:
        type: integer
    CatalogSagaId:
      name: sagaId
      in: query
      required: false
      schema:
        type: integer
    CatalogLanguageId:
      name: idiomaId
      in: query
      required: false
      schema:
        type: integer
    CatalogStyleId:
      name: estiloId
      in: query
      required: false
      schema:
        type: integer
    CatalogReadingStatusId:
      name: estadoId
      in: query
      required: false
      schema:
        type: integer
        enum:
        - 0
        - 1
        - 2
        - 3
        - 4
        - 5
    CatalogMinRating:
      name: puntuacionMin
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 5
    CatalogPage:
      name: page
      in: query
      required: false
      description: Si se envia page o pageSize, la respuesta usa formato paginado.
      schema:
        type: integer
        minimum: 1
        default: 1
    CatalogPageSize:
      name: pageSize
      in: query
      required: false
      description: Maximo 100.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    ImageName:
      name: name
      in: path
      required: true
      schema:
        type: string
  requestBodies:
    ReadingStatusWrite:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - EstadoId
            properties:
              EstadoId:
                type: integer
                enum:
                - 0
                - 1
                - 2
                - 3
                - 4
                - 5
                description: 0 En espera, 1 En marcha, 2 Leido, 3 Por comprar, 4 Quiero leer, 5 Descartado.
              Fecha:
                type: [string, 'null']
                format: date-time
                description: Fecha ISO 8601 opcional del historico. Si se omite, usa la fecha del servidor.
              PublicarActividad: {type: [boolean, 'null'], description: 'true fuerza una publicación puntual; false la inhibe; null u omitido usa preferencias.'}
    RatingWrite:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - Puntuacion
            properties:
              Puntuacion:
                type: integer
                minimum: 1
                maximum: 5
              Resena:
                type:
                - string
                - 'null'
                description: Opcional. Si se envia, actualiza la resena junto con la puntuacion. Null o cadena vacia la borran.
              PublicarActividad: {type: [boolean, 'null'], description: 'true fuerza una publicación puntual; false la inhibe; null u omitido usa preferencias.'}
    ReviewWrite:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - Resena
            properties:
              Resena:
                type:
                - string
                - 'null'
                description: Null o cadena vacia borran la resena.
              PublicarActividad: {type: [boolean, 'null'], description: 'true fuerza una publicación puntual; false la inhibe; null u omitido usa preferencias.'}
    CatalogRequestCreate:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CatalogRequestCreate'
    CatalogRequestResolve:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CatalogRequestResolve'
    ReportCreate:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ReportCreate'
    ReportResolve:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ReportResolve'
    AnthologySectionWrite:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AnthologySectionWrite'
        multipart/form-data:
          schema:
            $ref: '#/components/schemas/MultipartWithPayload'
    UniverseSectionWrite:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - UniversoId
            - LibroId
            properties:
              UniversoId:
                type: integer
              LibroId:
                type: integer
    SagaSectionWrite:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - SagaId
            - LibroId
            - Orden
            properties:
              SagaId:
                type: integer
              LibroId:
                type: integer
              Orden:
                type: number
    CharacterCreate:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - LibroId
            - Apodo
            - Sexo
            anyOf:
            - required:
              - Entradas
            - required:
              - Descripcion
            properties:
              LibroId:
                type: integer
              Apodo:
                type: string
                minLength: 2
                maxLength: 100
              Sexo:
                oneOf:
                - type: boolean
                - type: integer
              Entradas:
                type: array
                minItems: 1
                items:
                  $ref: '#/components/schemas/NarrativeEntryCreate'
              Descripcion:
                type: string
                minLength: 15
                description: Atajo legacy. Si no se envia Entradas, crea una unica entrada con nombre igual a Apodo.
    CharacterRootUpdate:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - Sexo
            properties:
              Sexo:
                type: integer
                enum:
                - 0
                - 1
                - 2
    NarrativeNameUpdate:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - Nombre
            properties:
              LibroId:
                type: integer
              Nombre:
                type: string
                minLength: 2
                maxLength: 100
    LocationUpdate:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              LibroId:
                type: integer
              Nombre:
                type: string
                minLength: 2
                maxLength: 100
              EstadoId:
                type: integer
    EventUpdate:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              LibroId:
                type: integer
              Nombre:
                type: string
                minLength: 2
                maxLength: 100
              Id_Localizacion:
                type: integer
              Personajes:
                type: array
                items:
                  oneOf:
                  - type: integer
                  - type: object
                    properties:
                      Id:
                        type: integer
    QuoteUpdate:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              LibroId:
                type: integer
              Nombre:
                type: string
                minLength: 2
                maxLength: 100
              Pagina:
                type: integer
              PersonajeId:
                type: integer
    NarrativeEntriesCreate:
      required: true
      content:
        application/json:
          schema:
            oneOf:
            - type: object
              required:
              - LibroId
              - Entradas
              properties:
                LibroId:
                  type: integer
                Entradas:
                  type: array
                  minItems: 1
                  items:
                    $ref: '#/components/schemas/NarrativeEntryCreate'
            - type: object
              required:
              - LibroId
              - Nombre
              - Descripcion
              properties:
                LibroId:
                  type: integer
                Nombre:
                  type: string
                  minLength: 2
                  maxLength: 100
                Descripcion:
                  type: string
                  minLength: 15
    NarrativeEntryUpdate:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NarrativeEntryCreate'
    CharacterBookAlias:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - LibroId
            - Apodo
            properties:
              LibroId:
                type: integer
              Apodo:
                type: string
                minLength: 2
                maxLength: 100
    CharacterAliasUpdate:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - Apodo
            properties:
              Apodo:
                type: string
                minLength: 2
                maxLength: 100
    CharacterStateWrite:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - LibroId
