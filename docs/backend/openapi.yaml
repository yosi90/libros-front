      description: Estado personal actualizado
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
              Estado:
                type: object
                properties:
                  Id:
                    type: integer
                    description: Id historico de fecha_estado_libros/fecha_estado_antologias.
                  EstadoId:
                    type: integer
                    description: Id del catalogo estados_libro.
                  Nombre:
                    type: string
                  Fecha:
                    type: [string, 'null']
                    format: date-time
    RatingUpdated:
      description: Puntuacion personal actualizada
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
              Puntuacion:
                type: integer
                minimum: 1
                maximum: 5
              Resena:
                type:
                - string
                - 'null'
                description: Solo aparece si se envio en la peticion.
              ResenaOculta:
                type: boolean
                description: Solo aparece si se envio Resena; indica que la nueva edicion queda visible.
    ReviewUpdated:
      description: Resena personal actualizada
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
              Resena:
                type:
                - string
                - 'null'
              ResenaOculta:
                type: boolean
