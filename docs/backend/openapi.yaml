      in: path
      required: true
      schema:
        type: integer
    IdPersonaje:
      name: id_personaje
      in: path
      required: true
      schema:
        type: integer
    IdOrganizacion:
      name: id_organizacion
      in: path
      required: true
      schema:
        type: integer
    IdLocalizacion:
      name: id_localizacion
      in: path
      required: true
      schema:
        type: integer
    IdApodo:
      name: id_apodo
      in: path
      required: true
      schema:
        type: integer
    IdRelacionPersonaje:
      name: id_relacion
      in: path
      required: true
      schema:
        type: integer
    IdAntologia:
      name: id_antologia
      in: path
      required: true
      schema:
        type: integer
    IdEstadoHistorico:
      name: id_estado_historico
      in: path
      required: true
      schema:
        type: integer
    IdPeticionCatalogo:
      name: id_peticion
      in: path
      required: true
      schema:
        type: integer
    IdGrupoReporte:
      name: id_grupo
      in: path
      required: true
      schema:
        type: integer
    CatalogQuery:
      name: q
      in: query
      required: false
      schema:
        type: string
    CatalogAuthorId:
      name: autorId
      in: query
      required: false
      schema:
        type: integer
    CatalogUniverseId:
      name: universoId
      in: query
      required: false
      schema:
        type: integer
    CatalogSagaId:
      name: sagaId
      in: query
      required: false
      schema:
        type: integer
    CatalogLanguageId:
      name: idiomaId
      in: query
      required: false
      schema:
        type: integer
    CatalogStyleId:
      name: estiloId
      in: query
      required: false
      schema:
        type: integer
    CatalogReadingStatusId:
      name: estadoId
      in: query
      required: false
      schema:
        type: integer
        enum:
        - 0
        - 1
        - 2
        - 3
        - 4
        - 5
    CatalogMinRating:
      name: puntuacionMin
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 5
    ImageName:
      name: name
      in: path
      required: true
      schema:
        type: string
  requestBodies:
    ReadingStatusWrite:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - EstadoId
            properties:
              EstadoId:
                type: integer
                enum:
                - 0
                - 1
                - 2
                - 3
                - 4
                - 5
                description: 0 En espera, 1 En marcha, 2 Leido, 3 Por comprar, 4 Quiero leer, 5 Descartado.
    RatingWrite:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - Puntuacion
            properties:
              Puntuacion:
                type: integer
                minimum: 1
                maximum: 5
              Resena:
                type:
                - string
                - 'null'
                description: Opcional. Si se envia, actualiza la resena junto con la puntuacion. Null o cadena vacia la borran.
    ReviewWrite:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - Resena
            properties:
              Resena:
                type:
                - string
                - 'null'
                description: Null o cadena vacia borran la resena.
    BookLanguagesWrite:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              IdiomaId:
                type: integer
              Idiomas:
                type: array
                items:
                  oneOf:
                  - type: integer
                  - type: object
                    properties:
                      Id:
                        type: integer
    CatalogRequestCreate:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CatalogRequestCreate'
    CatalogRequestResolve:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CatalogRequestResolve'
    ReportCreate:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ReportCreate'
    ReportResolve:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ReportResolve'
    AuthorWrite:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthorWrite'
    UniverseWrite:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UniverseWrite'
    SagaWrite:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SagaWrite'
    BookWriteFlexible:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BookWrite'
        multipart/form-data:
          schema:
            $ref: '#/components/schemas/MultipartWithPayload'
    AnthologyWriteFlexible:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AnthologyWrite'
        multipart/form-data:
          schema:
            $ref: '#/components/schemas/MultipartWithPayload'
    AnthologySectionWrite:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AnthologySectionWrite'
        multipart/form-data:
          schema:
            $ref: '#/components/schemas/MultipartWithPayload'
    UniverseSectionWrite:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - UniversoId
            - LibroId
            properties:
              UniversoId:
                type: integer
              LibroId:
                type: integer
    SagaSectionWrite:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - SagaId
            - LibroId
            - Orden
            properties:
              SagaId:
                type: integer
              LibroId:
                type: integer
              Orden:
                type: number
    CharacterCreate:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - LibroId
            - Apodo
            - Sexo
            anyOf:
            - required:
              - Entradas
            - required:
              - Descripcion
            properties:
              LibroId:
                type: integer
              Apodo:
                type: string
                minLength: 2
                maxLength: 100
              Sexo:
                oneOf:
                - type: boolean
                - type: integer
              Entradas:
                type: array
                minItems: 1
                items:
                  $ref: '#/components/schemas/NarrativeEntryCreate'
              Descripcion:
