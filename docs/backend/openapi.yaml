        EstadoParticipante: {type: string, enum: [activo, salio, expulsado]}
        EsSistema: {type: boolean}
        Contraparte: {oneOf: [{$ref: '#/components/schemas/UserSummary'}, {type: 'null'}]}
        UltimoMensaje: {oneOf: [{$ref: '#/components/schemas/ConversationLastMessage'}, {type: 'null'}]}
