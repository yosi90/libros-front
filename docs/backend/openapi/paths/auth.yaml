/auth:
  post:
    operationId: postAuth
    tags:
    - Auth
    summary: Login
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../openapi.yaml#/components/schemas/LoginRequest'
    responses:
      '200':
        description: Login correcto
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/AuthTokens'
      '401':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
/auth/email:
  get:
    operationId: getAuthEmail
    tags:
    - Auth
    summary: Comprueba si existe un email
    security: []
    parameters:
    - $ref: '../../openapi.yaml#/components/parameters/EmailQuery'
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200':
        description: Resultado de existencia
        content:
          application/json:
            schema:
              type: object
              properties:
                existe:
                  type: boolean
/auth/register:
  post:
    operationId: postAuthRegister
    tags:
    - Auth
    summary: Registra usuario
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../openapi.yaml#/components/schemas/RegisterRequest'
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '201':
        description: Usuario registrado
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/MessageResponse'
/auth/registeradmin:
  post:
    operationId: postAuthRegisteradmin
    tags:
    - Auth
    summary: Registra usuario administrador
    description: Requiere JWT de administrador. No es una ruta publica.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../openapi.yaml#/components/schemas/RegisterRequest'
    responses:
      '200':
        description: Administrador registrado
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/MessageResponse'
      '403':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
/auth/user:
  get:
    operationId: getAuthUser
    tags:
    - Auth
    summary: Devuelve usuario autenticado
    responses:
      '200':
        description: Usuario autenticado
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/UserProfileResponse'
      '401':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
/auth/account-states:
  get:
    operationId: getAuthAccountStates
    tags:
    - Auth
    summary: Lista estados de cuenta
    description: Endpoint para pantallas de administracion. Requiere JWT de administrador.
    responses:
      '200':
        description: Catalogo de estados de cuenta
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/AccountStatesResponse'
      '403':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
/auth/password-reset/request:
  post:
    operationId: postAuthPasswordResetRequest
    tags:
    - Auth
    summary: Solicita email de recuperacion de contrasena
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../openapi.yaml#/components/schemas/PasswordResetRequest'
    responses:
      '400': {$ref: '../../openapi.yaml#/components/responses/BadRequest'}
      '200':
        description: Respuesta generica para evitar enumeracion de usuarios
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/MessageResponse'
      '500':
        description: Fallo de envio por Brevo API o SMTP fallback si el usuario existe
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/MessageResponse'
/auth/password-reset/confirm:
  post:
    operationId: postAuthPasswordResetConfirm
    tags:
    - Auth
    summary: Cambia contrasena usando token de recuperacion
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../openapi.yaml#/components/schemas/PasswordResetConfirmRequest'
    responses:
      '200':
        description: Contrasena actualizada
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/PasswordResetConfirmResponse'
      '400':
        description: Token invalido, expirado, usado o password invalida
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/MessageResponse'
/auth/email-verification/confirm:
  post:
    operationId: postAuthEmailVerificationConfirm
    tags:
    - Auth
    summary: Confirma verificacion de email
    description: Activa una cuenta registrada o confirma un cambio de email pendiente.
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../openapi.yaml#/components/schemas/EmailVerificationConfirmRequest'
    responses:
      '200':
        description: Email verificado
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/UserProfileResponse'
      '400':
        description: Token invalido, expirado o usado
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/MessageResponse'
/auth/email-verification/resend:
  post:
    operationId: postAuthEmailVerificationResend
    tags:
    - Auth
    summary: Reenvia email de verificacion
    description: Acepta token JWT limitado o completo.
    responses:
      '200':
        $ref: '../../openapi.yaml#/components/responses/Message'
      '401':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
/auth/update:
  put:
    operationId: putAuthUpdate
    tags:
    - Auth
    summary: Actualiza usuario autenticado
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../openapi.yaml#/components/schemas/UserUpdateRequest'
    responses:
      '200':
        $ref: '../../openapi.yaml#/components/responses/Message'
      '401':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
/auth/refresh-token:
  get:
    operationId: getAuthRefreshToken
    tags:
    - Auth
    summary: Refresca access token
    description: Requiere refresh token Bearer.
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200':
        description: Tokens renovados
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/AuthTokens'
/auth/firebase-custom-token:
  post:
    operationId: postAuthFirebaseCustomToken
    tags:
    - Auth
    summary: Emite un custom token de Firebase para el usuario autenticado
    description: El JWT de Libros sigue siendo la credencial de la API. El token solo inicia sesion en Firebase con UID `libros:<id_usuario>`; no transporta roles ni permisos de la API.
    responses:
      '200':
        description: Custom token emitido, valido durante una hora para completar el inicio de sesion Firebase.
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/FirebaseCustomTokenResponse'
      '401':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
      '503':
        description: Firebase Admin no esta configurado en este entorno.
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: No se pudo emitir el token Firebase.
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/ErrorResponse'
