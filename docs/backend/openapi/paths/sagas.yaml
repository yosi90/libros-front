/sagas:
  get:
    tags:
    - Sagas
    summary: Lista sagas
    responses:
      '200':
        description: Lista de sagas
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../../openapi.yaml#/components/schemas/Saga'
/sagas/{id_saga}:
  get:
    tags:
    - Sagas
    summary: Detalle de saga
    parameters:
    - $ref: '../../openapi.yaml#/components/parameters/IdSaga'
    responses:
      '200':
        description: Saga
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/Saga'
