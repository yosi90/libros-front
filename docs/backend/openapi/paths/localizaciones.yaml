/localizaciones:
  post:
    tags:
    - Localizaciones
    summary: Crea una localizacion con entrada inicial valida
    description: Asocia la localizacion al libro si es autoconclusivo o a la saga del libro con id_libro_origen si pertenece
      a saga/seccion.
    requestBody:
      $ref: '../../openapi.yaml#/components/requestBodies/LocationCreate'
    responses:
      '201':
        description: Localizacion creada
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/Location'
      '400':
        $ref: '../../openapi.yaml#/components/responses/Message'
      '403':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
      '404':
        $ref: '../../openapi.yaml#/components/responses/Message'
