/reportes:
  post:
    operationId: postReportes
    tags:
    - Reportes
    summary: Crea un reporte sobre una resena
    description: V1 solo acepta TipoFuente=resena y EntidadTipo libro o antologia.
    requestBody:
      $ref: '../../openapi.yaml#/components/requestBodies/ReportCreate'
    responses:
      '201':
        description: Reporte creado
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/ReportCreated'
      '400':
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../../openapi.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../../openapi.yaml#/components/responses/NotFound'
      '409':
        $ref: '../../openapi.yaml#/components/responses/Conflict'
/reportes/mios:
  get:
    operationId: getReportesMios
    tags:
    - Reportes
    summary: Lista mis reportes
    description: "Devuelve los reportes creados por el usuario autenticado. Por defecto muestra activos: pendientes. Reportes contiene solo el motivo enviado por el usuario autenticado."
    parameters:
    - name: estado
      in: query
      required: false
      schema:
        type: string
        enum:
        - activas
        - pendiente
        - aceptado
        - rechazado
        - historial
        - todos
        default: activas
    responses:
      '200':
        description: Lista de reportes propios agrupados por fuente
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../../openapi.yaml#/components/schemas/ReportGroup'
      '400':
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
