/biblioteca/actividad_reciente:
  get:
    operationId: getBibliotecaActividadReciente
    tags:
    - Biblioteca
    summary: Actividad reciente de biblioteca
    parameters:
    - in: query
      name: limit
      schema:
        type: integer
        default: 4
        minimum: 1
        maximum: 50
    responses:
      '200':
        description: Lista mezclada de libros y antologias con ultimo estado
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../../openapi.yaml#/components/schemas/RecentLibraryActivity'
      '401':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
