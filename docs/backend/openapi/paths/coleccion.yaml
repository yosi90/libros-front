/coleccion/items:
  get:
    operationId: getColeccionItems
    tags:
    - Coleccion
    summary: Items guardados por el usuario autenticado
    parameters:
    - name: tipo
      in: query
      required: false
      schema:
        type: string
        enum:
        - libro
        - libros
        - antologia
        - antologias
    responses:
      '200':
        description: Lista de libros y/o antologias guardados
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../../openapi.yaml#/components/schemas/CollectionItem'
      '401':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
/coleccion/universos:
  get:
    operationId: getColeccionUniversos
    tags:
    - Coleccion
    summary: Coleccion personal agrupada por universos
    responses:
      '200':
        description: Vista personal agrupada por universos
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../../openapi.yaml#/components/schemas/CollectionUniverse'
      '401':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
/coleccion/libros/{id_libro}/estado:
  post:
    operationId: postColeccionLibrosByIdLibroEstado
    tags:
    - Coleccion
    summary: Actualiza estado personal de un libro
    parameters:
    - $ref: '../../openapi.yaml#/components/parameters/IdLibro'
    requestBody:
      $ref: '../../openapi.yaml#/components/requestBodies/ReadingStatusWrite'
    responses:
      '200':
        $ref: '../../openapi.yaml#/components/responses/ReadingStatusUpdated'
      '400':
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
  patch:
    operationId: patchColeccionLibrosByIdLibroEstado
    tags:
    - Coleccion
    summary: Actualiza estado personal de un libro
    parameters:
    - $ref: '../../openapi.yaml#/components/parameters/IdLibro'
