/coleccion/libros/estados/{id_estado_historico}:
  patch:
    operationId: patchColeccionLibrosEstadosByIdEstadoHistorico
    tags:
    - Coleccion
    summary: Corrige un historico de estado de libro
    description: Permitido al usuario propietario del historico o a administradores.
    parameters:
    - $ref: '../../openapi.yaml#/components/parameters/IdEstadoHistorico'
    requestBody:
      $ref: '../../openapi.yaml#/components/requestBodies/ReadingStatusWrite'
    responses:
      '200':
        $ref: '../../openapi.yaml#/components/responses/ReadingStatusUpdated'
      '400':
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../../openapi.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../../openapi.yaml#/components/responses/NotFound'
  delete:
    operationId: deleteColeccionLibrosEstadosByIdEstadoHistorico
    tags:
    - Coleccion
    summary: Borra logicamente un historico de estado de libro
    description: Marca id_estado = -1. Las lecturas y metricas ignoran historicos borrados.
    parameters:
    - $ref: '../../openapi.yaml#/components/parameters/IdEstadoHistorico'
    responses:
      '200':
        $ref: '../../openapi.yaml#/components/responses/Message'
      '401':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../../openapi.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../../openapi.yaml#/components/responses/NotFound'
