/antologias:
  get:
    operationId: getAntologias
    tags:
    - Antologias
    summary: Lista antologias
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200':
        description: Lista de antologias
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../../openapi.yaml#/components/schemas/Anthology'
/antologias/{id_antologia}:
  get:
    operationId: getAntologiasByIdAntologia
    tags:
    - Antologias
    summary: Detalle de antologia
    parameters:
    - $ref: '../../openapi.yaml#/components/parameters/IdAntologia'
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200':
        description: Antologia
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/Anthology'
/antologias/leidos:
  get:
    operationId: getAntologiasLeidos
    tags:
    - Antologias
    summary: Cuenta antologias leidas
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200':
        $ref: '../../openapi.yaml#/components/responses/MetricObject'
/antologias/no_leidos:
  get:
    operationId: getAntologiasNoLeidos
    tags:
    - Antologias
    summary: Cuenta antologias no leidas
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200':
        $ref: '../../openapi.yaml#/components/responses/MetricObject'
/antologias/secciones/leidas:
  get:
    operationId: getAntologiasSeccionesLeidas
    tags:
    - Antologias
    summary: Cuenta secciones leidas
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200':
        $ref: '../../openapi.yaml#/components/responses/MetricObject'
/antologias/secciones:
  post:
    operationId: postAntologiasSecciones
    tags:
    - Antologias
    summary: Crea seccion de antologia
    description: Acepta Sinopsis opcional para el libro-seccion creado.
    requestBody:
      $ref: '../../openapi.yaml#/components/requestBodies/AnthologySectionWrite'
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '201':
        description: Seccion creada
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/FlexibleObject'
  patch:
    operationId: patchAntologiasSecciones
    tags:
    - Antologias
    summary: Actualiza paginas de seccion de antologia
    requestBody:
      $ref: '../../openapi.yaml#/components/requestBodies/AnthologySectionWrite'
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200':
        description: Seccion actualizada
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/FlexibleObject'
/antologias/secciones/{id_libro}:
  get:
    operationId: getAntologiasSeccionesByIdLibro
    tags:
    - Antologias
    summary: Detalle de seccion de antologia
    parameters:
    - $ref: '../../openapi.yaml#/components/parameters/IdLibro'
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200':
        description: Seccion
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/FlexibleObject'
