/universos:
  get:
    operationId: getUniversos
    tags:
    - Universos
    summary: Lista universos con relaciones
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200':
        description: Lista de universos
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../../openapi.yaml#/components/schemas/Universe'
/universos/{id_universo}:
  get:
    operationId: getUniversosByIdUniverso
    tags:
    - Universos
    summary: Detalle de universo
    parameters:
    - $ref: '../../openapi.yaml#/components/parameters/IdUniverso'
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200':
        description: Universo
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/Universe'
