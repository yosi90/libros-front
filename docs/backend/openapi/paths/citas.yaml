/citas:
  post:
    operationId: postCitas
    tags:
    - Citas
    summary: Crea una cita con entrada inicial valida
    description: Asocia la cita al libro si es autoconclusivo o a la saga del libro con id_libro_origen si pertenece a saga/seccion.
    requestBody:
      $ref: '../../openapi.yaml#/components/requestBodies/QuoteCreate'
    responses:
      '201':
        description: Cita creada
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/Quote'
      '400':
        $ref: '../../openapi.yaml#/components/responses/Message'
      '403':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
      '404':
        $ref: '../../openapi.yaml#/components/responses/Message'
/citas/{id_cita}:
  patch:
    operationId: patchCitasByIdCita
    tags:
    - Citas
    summary: Actualiza campos raiz de una cita
    parameters:
    - $ref: '../../openapi.yaml#/components/parameters/IdCita'
    requestBody:
      $ref: '../../openapi.yaml#/components/requestBodies/QuoteUpdate'
    responses:
      '200':
        description: Cita actualizada
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/Quote'
      '400':
        $ref: '../../openapi.yaml#/components/responses/Message'
      '403':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
      '404':
        $ref: '../../openapi.yaml#/components/responses/Message'
/citas/{id_cita}/libros/{id_libro}:
  delete:
    operationId: deleteCitasByIdCitaLibrosByIdLibro
    tags:
    - Citas
    summary: Desasocia cita del libro o saga actual
    parameters:
    - $ref: '../../openapi.yaml#/components/parameters/IdCita'
    - $ref: '../../openapi.yaml#/components/parameters/IdLibro'
    responses:
      '200':
        $ref: '../../openapi.yaml#/components/responses/Message'
      '403':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
      '404':
        $ref: '../../openapi.yaml#/components/responses/Message'
      '409':
        $ref: '../../openapi.yaml#/components/responses/Message'
