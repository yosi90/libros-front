/image/get/cover/{name}:
  get:
    operationId: getImageGetCoverByName
    tags:
    - Imagenes
    summary: Obtiene portada
    security: []
    parameters:
    - $ref: '../../openapi.yaml#/components/parameters/ImageName'
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200':
        $ref: '../../openapi.yaml#/components/responses/ImageFile'
/image/get/photo/{name}:
  get:
    operationId: getImageGetPhotoByName
    tags:
    - Imagenes
    summary: Obtiene foto
    security: []
    parameters:
    - $ref: '../../openapi.yaml#/components/parameters/ImageName'
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200':
        $ref: '../../openapi.yaml#/components/responses/ImageFile'
/image/set/cover/{name}:
  post:
    operationId: postImageSetCoverByName
    tags:
    - Imagenes
    summary: Sube portada
    description: El nombre debe pertenecer al usuario del JWT, con prefijo b_<id_usuario>_ o a_<id_usuario>_. La API normaliza
      a PNG y max 600x900.
    parameters:
    - $ref: '../../openapi.yaml#/components/parameters/ImageName'
    requestBody:
      $ref: '../../openapi.yaml#/components/requestBodies/ImageUpload'
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200':
        $ref: '../../openapi.yaml#/components/responses/Message'
/image/set/photo:
  post:
    operationId: postImageSetPhoto
    tags:
    - Imagenes
    summary: Sube foto
    description: Genera u_<id_usuario>.png desde el JWT, actualiza usuarios.imagen, borra avatares anteriores y normaliza
      a PNG max 256x256.
    requestBody:
      $ref: '../../openapi.yaml#/components/requestBodies/ImageUpload'
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200':
        $ref: '../../openapi.yaml#/components/responses/Message'
