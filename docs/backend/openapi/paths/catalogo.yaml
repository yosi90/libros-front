/catalogo/admin/estadisticas/peticiones:
  get:
    tags: [Catalogo]
    operationId: getCatalogRequestStatistics
    summary: Consulta agregados anonimizados de peticiones de catálogo
    description: Requiere administrador o moderador. Agrupa por estado, tipo de entidad y acción sin exponer solicitantes.
    responses:
      '200': {description: Totales y desglose de peticiones, content: {application/json: {schema: {type: object, required: [Total, PorEstado, Desglose], properties: {Total: {type: integer}, PorEstado: {type: object, additionalProperties: {type: integer}}, Desglose: {type: array, items: {type: object, required: [TipoEntidad, Accion, Estado, Total], properties: {TipoEntidad: {type: string}, Accion: {type: string, enum: [alta, edicion]}, Estado: {type: string}, Total: {type: integer}}}}}}}}}
