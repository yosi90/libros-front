      '403': {$ref: '../../openapi.yaml#/components/responses/Forbidden'}
/catalogo/admin/idiomas:
  post:
    tags: [Catalogo]
    operationId: createCatalogLanguage
    summary: Crea un idioma normalizado
    description: Requiere administrador o moderador. Código de dos a diez caracteres alfanuméricos o con guion.
    requestBody: {required: true, content: {application/json: {schema: {type: object, required: [Nombre, Codigo], properties: {Nombre: {type: string, minLength: 1, maxLength: 100}, Codigo: {type: string, minLength: 2, maxLength: 10}}}}}}
