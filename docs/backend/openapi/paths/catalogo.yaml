/catalogo/libros:
  get:
    operationId: getCatalogoLibros
    tags:
    - Catalogo
    summary: Catalogo global de libros canonicos
    description: Lista libros del catalogo compartido. Los filtros estadoId y puntuacionMin usan datos personales del usuario
      autenticado.
    parameters:
    - $ref: '../../openapi.yaml#/components/parameters/CatalogQuery'
    - $ref: '../../openapi.yaml#/components/parameters/CatalogAuthorId'
    - $ref: '../../openapi.yaml#/components/parameters/CatalogUniverseId'
    - $ref: '../../openapi.yaml#/components/parameters/CatalogSagaId'
    - $ref: '../../openapi.yaml#/components/parameters/CatalogLanguageId'
    - $ref: '../../openapi.yaml#/components/parameters/CatalogStyleId'
    - $ref: '../../openapi.yaml#/components/parameters/CatalogReadingStatusId'
    - $ref: '../../openapi.yaml#/components/parameters/CatalogMinRating'
    - $ref: '../../openapi.yaml#/components/parameters/CatalogPage'
    - $ref: '../../openapi.yaml#/components/parameters/CatalogPageSize'
    responses:
      '200':
        description: Lista de libros canonicos
        content:
          application/json:
            schema:
              oneOf:
              - type: array
                items:
                  $ref: '../../openapi.yaml#/components/schemas/CatalogItem'
              - $ref: '../../openapi.yaml#/components/schemas/CatalogItemsPage'
      '401':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
/catalogo/libros/{id_libro}/detalle-publico:
  get:
    operationId: getCatalogoLibrosByIdLibroDetallePublico
    tags:
    - Catalogo
    summary: Detalle publico de libro canonico
    description: Devuelve metadatos canonicos, MiColeccion del usuario autenticado y estadisticas agregadas anonimas.
    parameters:
    - $ref: '../../openapi.yaml#/components/parameters/IdLibro'
    responses:
      '200':
        description: Detalle publico de libro
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/CatalogPublicDetail'
      '401':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
      '404':
        $ref: '../../openapi.yaml#/components/responses/NotFound'
