/catalogo/lugares-origen:
  get:
    tags:
    - Catalogo
    summary: Catalogo auxiliar de lugares de origen
    description: Autocomplete paginado. La busqueda compara tanto nombre visible como nombre normalizado.
    parameters:
    - $ref: '../../openapi.yaml#/components/parameters/CatalogQuery'
    - $ref: '../../openapi.yaml#/components/parameters/CatalogPage'
    - $ref: '../../openapi.yaml#/components/parameters/CatalogPageSize'
    - name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    - name: pageSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    responses:
      '200':
        description: Pagina de lugares de origen normalizados
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/OriginPlacesPage'
      '401':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
