/comunidad/capacidades:
  get:
    tags: [Comunidad]
    operationId: getCommunityCapabilities
    summary: Configuracion efectiva de capacidades comunitarias para la cuenta y cliente actual
    description: Enviar `X-Client-Version` (semver `mayor.menor.parche`) o `clientVersion`. Si falta, es invalida, la configuracion expira o una capacidad no es compatible, la respuesta es conservadora y no activa esa superficie. Estas banderas solo orientan la UI; no conceden permisos ni sustituyen los guards de audiencia, bloqueo, membresia, sancion o politica.
    parameters:
      - {name: X-Client-Version, in: header, schema: {type: string, pattern: '^\\d+(\\.\\d+){0,2}$'}}
      - {name: clientVersion, in: query, schema: {type: string, pattern: '^\\d+(\\.\\d+){0,2}$'}, description: Alternativa al header para clientes sin cabecera propia.}
    x-functional-error-codes:
      community_capabilities_unavailable: "503: no se pudo calcular la configuracion. Usar todas las capacidades como desactivadas, conservar biblioteca y sesion, y reintentar tras el TTL."
    responses:
      '200': {description: Configuracion calculada para el usuario autenticado, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/CommunityCapabilitiesResponse'}}}}
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '503': {description: Configuracion no disponible; el cliente aplica el fallback conservador, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/ErrorResponse'}}}}
/notificaciones:
  get:
    operationId: getNotificaciones
    tags: [Notificaciones]
    summary: Lista notificaciones propias
    parameters:
    - name: limit
      in: query
      schema: {type: integer, minimum: 1, maximum: 100, default: 50}
    - name: cursorFecha
      in: query
      schema: {type: string, format: date-time}
    - name: cursorId
      in: query
      schema: {type: integer, minimum: 1}
    - name: categoria
      in: query
      schema: {type: string, enum: [amistades, seguimiento, feed, chat, clubes, moderacion, sistema]}
    - name: lectura
      in: query
      schema: {type: string, enum: [todas, leidas, no_leidas], default: todas}
    responses:
      '200':
        description: Notificaciones propias por cursor estable `(fecha_creacion,id)`.
        content:
          application/json:
            schema: {$ref: '../../openapi.yaml#/components/schemas/NotificationListResponse'}
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
/notificaciones/{id}/leer:
  post:
    operationId: postNotificacionesByIdLeer
    tags: [Notificaciones]
    summary: Marca una notificacion como leida
    parameters: [{name: id, in: path, required: true, schema: {type: integer, minimum: 1}}]
    responses:
      '200':
        description: Lectura marcada de forma idempotente cuando la notificacion pertenece al usuario.
        content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/NotificationReadResponse'}}}
      '404': {description: La notificacion no pertenece al usuario o no existe, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/ErrorResponse'}}}}
/notificaciones/leer-todas:
  post:
    operationId: postNotificacionesLeerTodas
    tags: [Notificaciones]
    summary: Marca todas las notificaciones como leidas
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200':
        description: Todas las notificaciones pendientes se marcaron como leidas.
        content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/NotificationReadResponse'}}}
/notificaciones/leer-lote:
  post:
    operationId: postNotificacionesLeerLote
    tags: [Notificaciones]
    summary: Marca un lote de notificaciones propias como leidas
    requestBody:
      required: true
      content: {application/json: {schema: {type: object, required: [Ids], properties: {Ids: {type: array, minItems: 1, maxItems: 100, items: {type: integer, minimum: 1}}}}}}
    responses:
      '200': {description: Lote procesado idempotentemente, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/NotificationReadResponse'}}}}
      '400': {$ref: '../../openapi.yaml#/components/responses/BadRequest'}
/notificaciones/preferencias:
  get:
    operationId: getNotificacionesPreferencias
    tags: [Notificaciones]
    summary: Consulta preferencias por categoria y canal
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200':
        description: Preferencias efectivas
        content:
          application/json:
            schema:
              allOf:
              - $ref: '../../openapi.yaml#/components/schemas/SuccessResponse'
              - type: object
                required: [Preferencias]
                properties:
                  Preferencias: {type: array, items: {$ref: '../../openapi.yaml#/components/schemas/NotificationPreference'}}
  put:
    operationId: putNotificacionesPreferencias
    tags: [Notificaciones]
    summary: Actualiza preferencias de notificacion
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [Preferencias]
            properties:
              Preferencias: {type: array, items: {$ref: '../../openapi.yaml#/components/schemas/NotificationPreference'}}
    responses:
      '200': {description: Preferencias actualizadas, content: {application/json: {schema: {type: object}}}}
      '409': {description: Las categorias moderacion y sistema son obligatorias in-app, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/ErrorResponse'}}}}
/notificaciones/dispositivos:
  post:
    operationId: postNotificacionesDispositivos
    tags: [Notificaciones]
    summary: Registra o rota un token FCM del dispositivo actual
    requestBody:
      required: true
      content: {application/json: {schema: {type: object, required: [Token], properties: {Token: {type: string, minLength: 1, maxLength: 512}, Plataforma: {type: string, enum: [web, android, ios], default: web}}}}}
    responses:
      '201':
        description: Dispositivo registrado
        content:
          application/json:
            schema:
              allOf:
              - $ref: '../../openapi.yaml#/components/schemas/SuccessResponse'
              - type: object
                required: [Id]
                properties: {Id: {type: integer}}
      '400': {$ref: '../../openapi.yaml#/components/responses/BadRequest'}
/notificaciones/dispositivos/{id}:
  delete:
    operationId: deleteNotificacionesDispositivosById
    tags: [Notificaciones]
    summary: Revoca un dispositivo propio de forma idempotente
    parameters: [{name: id, in: path, required: true, schema: {type: integer, minimum: 1}}]
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200':
        description: Dispositivo revocado
        content:
          application/json:
            schema:
              allOf:
              - $ref: '../../openapi.yaml#/components/schemas/SuccessResponse'
              - type: object
                properties: {Id: {type: integer}}
/comunidad/usuarios:
  get:
    operationId: getComunidadUsuarios
    tags: [Comunidad]
    summary: Directorio publico autenticado
    parameters: [{name: q, in: query, schema: {type: string, maxLength: 100}, description: Búsqueda parcial pública. Con `@alias` busca coincidencia exacta solo entre perfiles públicos.}]
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200': {description: Hasta 100 perfiles publicos verificados, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/CommunityUserListResponse'}}}}
/comunidad/usuarios/{id}:
  get:
    operationId: getComunidadUsuariosById
    tags: [Comunidad]
    summary: Perfil individual accesible
    description: Los perfiles privados, bloqueados, no verificados o inaccesibles responden 404 para no revelar información.
    parameters: [{name: id, in: path, required: true, schema: {type: integer, minimum: 1}}]
    responses:
      '200': {description: Perfil visible, content: {application/json: {schema: {allOf: [{$ref: '../../openapi.yaml#/components/schemas/SuccessResponse'}, {type: object, required: [Usuario], properties: {Usuario: {$ref: '../../openapi.yaml#/components/schemas/CommunityUser'}}}]}}}}
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '404': {$ref: '../../openapi.yaml#/components/responses/NotFound'}
/comunidad/relaciones/{kind}:
  get:
    operationId: getComunidadRelacionesByKind
    tags: [Comunidad]
    summary: Lista relaciones propias por cursor
    x-functional-error-codes:
      invalid_relationship_kind: "400: kind debe ser seguidos, seguidores, amistades o bloqueos."
      account_sanctioned: "403: gate de cuenta; limpiar realtime y RTDB."
      capability_sanctioned: "403: gate del alcance comunidad."
      email_verification_pending: "403: cuenta sin verificar; no es sanción."
      usage_policy_acceptance_required: "403: falta política de uso."
      creation_policy_acceptance_required: "403: falta política de creación por la guardia de comunidad."
    parameters: [{name: kind, in: path, required: true, schema: {type: string, enum: [seguidos, seguidores, amistades, bloqueos]}}, {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 100, default: 50}}, {name: afterId, in: query, schema: {type: integer, minimum: 1}}]
    responses:
      '200': {description: Relaciones propias, content: {application/json: {schema: {type: object, required: [success, Relaciones, SiguienteAfterId], properties: {success: {type: boolean}, Relaciones: {type: array, items: {type: object, properties: {Usuario: {$ref: '../../openapi.yaml#/components/schemas/UserSummary'}, FechaCreacion: {type: string, format: date-time}}}}, SiguienteAfterId: {type: [integer, 'null']}}}}}}
      '400': {$ref: '../../openapi.yaml#/components/responses/BadRequest'}
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '403': {$ref: '../../openapi.yaml#/components/responses/Forbidden'}
/comunidad/usuarios/{id}/relacion:
  get:
    operationId: getComunidadUsuariosByIdRelacion
    tags: [Comunidad]
    summary: Estado propio respecto a un perfil accesible
    description: No expone relaciones de perfiles privados o bloqueados; dichos casos responden 404 igual que un perfil inexistente.
    x-functional-error-codes:
      community_profile_not_found: "404: perfil inexistente, privado, no verificado o inaccesible por bloqueo."
    parameters: [{name: id, in: path, required: true, schema: {type: integer, minimum: 1}}]
    responses:
      '200': {description: 'Estado de seguimiento, amistad y solicitud pendiente del usuario autenticado', content: {application/json: {schema: {type: object, required: [success, UsuarioId, Siguiendo, MeSigue, Amistad, SolicitudPendiente, PuedeInteractuar], properties: {success: {type: boolean}, UsuarioId: {type: integer}, Siguiendo: {type: boolean}, MeSigue: {type: boolean}, Amistad: {type: boolean}, SolicitudPendiente: {type: [object, 'null'], properties: {Direccion: {type: string, enum: [enviada, recibida]}, Estado: {type: string, enum: [pendiente]}}}, PuedeInteractuar: {type: boolean}}}}}}
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '403': {$ref: '../../openapi.yaml#/components/responses/Forbidden'}
      '404': {$ref: '../../openapi.yaml#/components/responses/NotFound'}
/comunidad/actividad/preferencias:
  get:
    operationId: getComunidadActividadPreferencias
    tags: [Comunidad]
    summary: Consulta preferencias de publicación automática de actividad lectora
    responses: {'200': {description: Preferencias propias; sin fila persistida devuelve AudienciaPredeterminada seguidores, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/ActivityPreferencesResponse'}}}}, '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}}
  put:
    operationId: putComunidadActividadPreferencias
    tags: [Comunidad]
    summary: Actualiza preferencias de publicación automática de actividad lectora
    requestBody: {required: true, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/ActivityPreferences'}}}}
    responses: {'200': {description: Preferencias actualizadas, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/ActivityPreferencesResponse'}}}}, '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}}
/comunidad/actividad/reconocimientos/{categoria}:
  post:
    operationId: postComunidadActividadReconocimientosByCategoria
    tags: [Comunidad]
    summary: Marca como explicada una categoría de actividad automática
    description: Operación idempotente por cuenta. Solo marca el reconocimiento; no modifica opt-ins, audiencia ni crea una publicación.
    x-functional-error-codes:
      invalid_activity_acknowledgement_category: "400: categoria debe ser estado, puntuacion o resena."
    parameters: [{name: categoria, in: path, required: true, schema: {type: string, enum: [estado, puntuacion, resena]}}]
    responses: {'200': {description: Reconocimiento persistido, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/ActivityAcknowledgementResponse'}}}}, '400': {$ref: '../../openapi.yaml#/components/responses/BadRequest'}}
/comunidad/publicaciones:
  get:
    operationId: getComunidadPublicaciones
    tags: [Comunidad]
    summary: Feed social visible para el usuario autenticado
    description: Aplica audiencia (`publico`, `seguidores`, `amigos` o `club`), privacidad del perfil, membresia y bloqueos en el backend. Pagina con el cursor keyset estable `(fecha_creacion,id)`. Los spoilers se ocultan por defecto según progreso; solo enviar revelarSpoilers=true tras una acción explícita.
    parameters:
    - {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 100, default: 20}}
    - {name: cursorFecha, in: query, schema: {type: string, format: date-time}}
    - {name: cursorId, in: query, schema: {type: integer, minimum: 1}}
    - {name: revelarSpoilers, in: query, schema: {type: boolean, default: false}, description: Revela spoilers tras una acción explícita.}
    responses: {'200': {description: Publicaciones visibles, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/CommunityPostListResponse'}}}}, '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}}
  post:
    operationId: postComunidadPublicaciones
    tags: [Comunidad]
    summary: Crea una publicacion Markdown con audiencia y vinculo canonico opcionales
    description: 'Con `Audiencia: club`, `ClubId` es obligatorio y el creador debe ser miembro activo. Para `publico`, `seguidores` y `amigos`, `ClubId` está prohibido. La retirada del club del descubrimiento no afecta a sus miembros activos.'
    x-functional-error-codes:
      invalid_post_audience: "400: audiencia desconocida o incompatible con la ruta de club."
      club_id_required_for_club_audience: "400: falta ClubId con Audiencia club."
      invalid_post_club_id: "400: ClubId no es un entero positivo."
      post_club_id_mismatch: "400: ClubId no coincide con la ruta de club."
      club_id_not_allowed_for_post_audience: "400: ClubId solo es válido con Audiencia club."
      club_post_target_unavailable: "404: club inexistente, eliminado o sin membresía activa; no distingue la causa."
    requestBody: {required: true, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/CommunityPostCreateRequest'}}}}
    responses:
      '201': {description: Publicacion creada, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/CommunityPostCreateResponse'}}}}
      '400': {description: Markdown obligatorio o demasiado largo, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/ErrorResponse'}}}}
/clubes-lectura:
  get:
    operationId: getClubesLectura
    tags: [ClubesLectura]
    summary: Descubre clubes abiertos
    description: Solo devuelve clubes abiertos activos y no bloqueados respecto al propietario; no revela clubes cerrados, eliminados o inaccesibles. Orden estable por `(FechaActualizacion DESC, Id DESC)`.
    x-functional-error-codes:
      invalid_club_discovery_limit: "400: limit debe estar entre 1 y 100."
      club_discovery_target_pair_required: "400: tipoObjetivo y objetivoId deben enviarse juntos."
      invalid_club_discovery_target_type: "400: tipoObjetivo debe ser libro, saga, universo o antologia."
      invalid_club_discovery_target_id: "400: objetivoId debe ser un entero positivo."
      invalid_club_discovery_cursor: "400: cursorFecha y cursorId deben enviarse juntos y ser válidos."
    parameters:
    - {name: q, in: query, schema: {type: string, maxLength: 100}, description: Búsqueda parcial por nombre.}
    - {name: tipoObjetivo, in: query, schema: {type: string, enum: [libro, saga, universo, antologia]}, description: Requiere objetivoId.}
    - {name: objetivoId, in: query, schema: {type: integer, minimum: 1}, description: Requiere tipoObjetivo.}
    - {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 100, default: 20}}
    - {name: cursorFecha, in: query, schema: {type: string, format: date-time}, description: Requiere cursorId.}
    - {name: cursorId, in: query, schema: {type: integer, minimum: 1}, description: Requiere cursorFecha.}
    responses:
      '200': {description: Página de clubes abiertos, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/ClubDiscoveryResponse'}}}}
      '400': {$ref: '../../openapi.yaml#/components/responses/BadRequest'}
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
  post:
    operationId: postClubesLectura
    tags: [ClubesLectura]
    summary: Crea un club de lectura
    description: Cada usuario puede ser propietario de un único club y debe tener al menos una obra en su colección personal. El creador se añade como propietario.
    x-functional-error-codes:
      club_owner_limit_reached: "409: ya eres propietario de un club. Gestiona el existente."
      club_personal_collection_required: "409: la colección personal está vacía. Añade una obra antes de crear un club."
    requestBody: {required: true, content: {application/json: {schema: {type: object, required: [Nombre], properties: {Nombre: {type: string, minLength: 2, maxLength: 150}, DescripcionMarkdown: {type: [string, 'null']}, Visibilidad: {type: string, enum: [abierto, cerrado], default: abierto}, Objetivo: {type: object, properties: {Tipo: {type: string, enum: [libro, saga, universo, antologia]}, Id: {type: integer, minimum: 1}}}}}}}}
    responses:
      '201': {description: Club creado, content: {application/json: {schema: {type: object, properties: {success: {type: boolean}, Id: {type: integer}}}}}}
      '400': {$ref: '../../openapi.yaml#/components/responses/BadRequest'}
      '409': {$ref: '../../openapi.yaml#/components/responses/Conflict'}
/clubes-lectura/{id}/publicaciones:
  get:
    operationId: getClubesLecturaByIdPublicaciones
    tags: [ClubesLectura]
    summary: Lista publicaciones del club para miembros activos
    parameters: [{name: id, in: path, required: true, schema: {type: integer, minimum: 1}}]
    responses: {'200': {description: Publicaciones visibles del club, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/CommunityPostListResponse'}}}}, '403': {$ref: '../../openapi.yaml#/components/responses/Forbidden'}}
  post:
    operationId: postClubesLecturaByIdPublicaciones
    tags: [ClubesLectura]
    summary: Crea una publicación con audiencia club
    description: 'Equivale a `POST /comunidad/publicaciones` con `Audiencia: club` y el `ClubId` de la ruta. Si se envía ClubId, debe coincidir con la ruta.'
    parameters: [{name: id, in: path, required: true, schema: {type: integer, minimum: 1}}]
    requestBody: {required: true, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/CommunityPostCreateRequest'}}}}
    responses: {'201': {description: Publicación creada, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/CommunityPostCreateResponse'}}}}, '400': {$ref: '../../openapi.yaml#/components/responses/BadRequest'}, '404': {$ref: '../../openapi.yaml#/components/responses/NotFound'}}
/chat/conversaciones:
  get:
    operationId: getChatConversaciones
    tags: [Chat]
    summary: Lista conversaciones activas del usuario autenticado
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200':
        description: Conversaciones activas ordenadas por ultimo mensaje descendente.
        content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/ConversationListResponse'}}}
/chat/ws-ticket:
  post:
    operationId: postChatWsTicket
    tags: [Chat]
    summary: Emite ticket de un uso para /ws/chat
    responses:
      '200': {description: 'Ticket de un uso, valido 60 segundos', content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/WebSocketTicketResponse'}}}}
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '500': {description: No se pudo emitir el ticket, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/ErrorResponse'}}}}
/chat/comunidad-ws-ticket:
  post:
    operationId: postChatComunidadWsTicket
    tags: [Comunidad]
    summary: Emite ticket de un uso para /ws/community
    responses:
      '200': {description: 'Ticket de un uso, valido 60 segundos', content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/WebSocketTicketResponse'}}}}
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '500': {description: No se pudo emitir el ticket, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/ErrorResponse'}}}}
/comunidad/seguimientos:
  post:
    operationId: postComunidadSeguimientos
    tags: [Comunidad]
    summary: Sigue a un usuario
    x-functional-error-codes:
      invalid_social_request: "400: UsuarioId ausente o no numérico."
      invalid_follow_target: "400: no se permite seguirse a sí mismo."
      user_blocked: "403: existe un bloqueo bilateral; no revela quién lo creó."
    requestBody: {required: true, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/UserTargetRequest'}}}}
    responses: {'200': {description: Seguimiento idempotente, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/FollowResponse'}}}}, '400': {$ref: '../../openapi.yaml#/components/responses/BadRequest'}, '403': {$ref: '../../openapi.yaml#/components/responses/Forbidden'}}
  delete:
    operationId: deleteComunidadSeguimientos
    tags: [Comunidad]
    summary: Deja de seguir a un usuario
    x-functional-error-codes:
      invalid_social_request: "400: UsuarioId ausente o no numérico."
      user_blocked: "403: existe un bloqueo bilateral; no revela quién lo creó."
    requestBody: {required: true, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/UserTargetRequest'}}}}
    responses: {'200': {description: Seguimiento eliminado, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/FollowResponse'}}}}, '400': {$ref: '../../openapi.yaml#/components/responses/BadRequest'}, '403': {$ref: '../../openapi.yaml#/components/responses/Forbidden'}}
/comunidad/amistades/solicitudes:
  get:
    operationId: getComunidadAmistadesSolicitudes
    tags: [Comunidad]
    summary: Lista solicitudes de amistad propias pendientes por cursor
    x-functional-error-codes:
      invalid_friend_request_direction: "400: tipo debe ser recibidas o enviadas."
    parameters: [{name: tipo, in: query, schema: {type: string, enum: [recibidas, enviadas], default: recibidas}}, {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 100, default: 50}}, {name: afterId, in: query, schema: {type: integer, minimum: 1}}]
    responses:
      '200': {description: Solicitudes pendientes del usuario autenticado, content: {application/json: {schema: {type: object, required: [success, Solicitudes, SiguienteAfterId], properties: {success: {type: boolean}, Solicitudes: {type: array, items: {type: object, properties: {Id: {type: integer}, Estado: {type: string, enum: [pendiente]}, Mensaje: {type: [string, 'null']}, FechaCreacion: {type: string, format: date-time}, Usuario: {$ref: '../../openapi.yaml#/components/schemas/UserSummary'}}}}, SiguienteAfterId: {type: [integer, 'null']}}}}}}
      '400': {$ref: '../../openapi.yaml#/components/responses/BadRequest'}
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '403': {$ref: '../../openapi.yaml#/components/responses/Forbidden'}
  post:
    operationId: postComunidadAmistadesSolicitudes
    tags: [Comunidad]
    summary: Envia una solicitud de amistad
    x-functional-error-codes:
      invalid_friend_target: "400: no se permite solicitar amistad a uno mismo."
      user_blocked: "403: existe un bloqueo bilateral; no revela quién lo creó."
    requestBody: {required: true, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/FriendRequestCreateRequest'}}}}
    responses: {'201': {description: Solicitud creada o ya existente, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/SuccessResponse'}}}}, '400': {$ref: '../../openapi.yaml#/components/responses/BadRequest'}, '403': {$ref: '../../openapi.yaml#/components/responses/Forbidden'}}
/comunidad/amistades/solicitudes/{id}:
  patch:
    operationId: patchComunidadAmistadesSolicitudesById
    tags: [Comunidad]
    summary: Acepta o rechaza una solicitud propia
    x-functional-error-codes:
      invalid_friend_state: "400: Estado debe ser aceptada o rechazada."
      friend_request_not_found: "404: no existe, no es recibida o ya fue resuelta."
    parameters: [{name: id, in: path, required: true, schema: {type: integer, minimum: 1}}]
    requestBody: {required: true, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/ResolutionStateRequest'}}}}
    responses: {'200': {description: Solicitud resuelta, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/ResolutionStateResponse'}}}}, '400': {$ref: '../../openapi.yaml#/components/responses/BadRequest'}, '403': {$ref: '../../openapi.yaml#/components/responses/Forbidden'}, '404': {$ref: '../../openapi.yaml#/components/responses/NotFound'}}
/comunidad/bloqueos:
  post:
    operationId: postComunidadBloqueos
    tags: [Comunidad]
    summary: Bloquea un usuario y revoca relaciones activas
    x-functional-error-codes:
      invalid_block_target: "400: no se permite bloquearse a uno mismo."
    requestBody: {required: true, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/UserTargetRequest'}}}}
    responses: {'200': {description: Bloqueo idempotente, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/BlockResponse'}}}}, '400': {$ref: '../../openapi.yaml#/components/responses/BadRequest'}, '403': {$ref: '../../openapi.yaml#/components/responses/Forbidden'}}
  delete:
    operationId: deleteComunidadBloqueos
    tags: [Comunidad]
    summary: Desbloquea un usuario
    x-functional-error-codes:
      invalid_social_request: "400: UsuarioId ausente o no numérico."
    requestBody: {required: true, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/UserTargetRequest'}}}}
    responses: {'200': {description: Bloqueo eliminado, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/BlockResponse'}}}}, '400': {$ref: '../../openapi.yaml#/components/responses/BadRequest'}, '403': {$ref: '../../openapi.yaml#/components/responses/Forbidden'}}
/comunidad/denuncias:
  post:
    operationId: postComunidadDenuncias
    tags: [Comunidad]
    summary: Denuncia contenido comunitario de otra persona
    description: Los mensajes y clubes exigen acceso legítimo; un recurso no accesible responde `content_not_found` sin revelar su existencia. El cliente solo envía tipo, ID y motivo.
    x-functional-error-codes:
      invalid_content_report: "400: tipo, entidad o motivo inválidos."
      cannot_report_own_content: "403: la fuente coincide con la persona denunciante."
      content_not_found: "404: recurso inexistente o no accesible, sin enumeración."
      duplicate_content_report: "409: ya existe una denuncia pendiente de la misma persona sobre esa entidad."
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [TipoEntidad, EntidadId, Motivo]
            properties:
              TipoEntidad: {type: string, enum: [publicacion, comentario, perfil, mensaje, club]}
              EntidadId: {type: integer, minimum: 1}
              Motivo: {type: string, minLength: 1, maxLength: 1000}
    responses:
      '201': {description: Denuncia creada o agrupada con las pendientes, content: {application/json: {schema: {type: object, properties: {success: {type: boolean}, GrupoId: {type: integer}}}}}}
      '400': {$ref: '../../openapi.yaml#/components/responses/BadRequest'}
      '403': {$ref: '../../openapi.yaml#/components/responses/Forbidden'}
      '404': {$ref: '../../openapi.yaml#/components/responses/NotFound'}
      '409': {$ref: '../../openapi.yaml#/components/responses/Conflict'}
/comunidad/publicaciones/{id}:
  patch:
    operationId: patchComunidadPublicacionesById
    tags: [Comunidad]
    summary: Edita una publicacion propia
    parameters: [{name: id, in: path, required: true, schema: {type: integer, minimum: 1}}]
    requestBody: {required: true, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/CommunityPostEditRequest'}}}}
    responses: {'200': {description: Publicacion editada y auditada, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/CommunityMutationResponse'}}}}, '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}}
  delete:
    operationId: deleteComunidadPublicacionesById
    tags: [Comunidad]
    summary: Elimina logicamente una publicacion propia
    parameters: [{name: id, in: path, required: true, schema: {type: integer, minimum: 1}}]
    responses: {'200': {description: Publicacion eliminada y auditada, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/CommunityMutationResponse'}}}}, '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}}
/comunidad/publicaciones/{id}/comentarios:
  get:
    operationId: getComunidadPublicacionesByIdComentarios
    tags: [Comunidad]
    summary: Lista comentarios visibles de una publicacion accesible
    description: Los spoilers se ocultan por defecto según progreso; solo enviar revelarSpoilers=true tras una acción explícita.
    parameters:
    - {name: id, in: path, required: true, schema: {type: integer, minimum: 1}}
    - {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 100, default: 20}}
    - {name: cursorFecha, in: query, schema: {type: string, format: date-time}}
    - {name: cursorId, in: query, schema: {type: integer, minimum: 1}}
    - {name: revelarSpoilers, in: query, schema: {type: boolean, default: false}, description: Revela spoilers tras una acción explícita.}
    responses: {'200': {description: Comentarios por cursor keyset, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/CommunityCommentListResponse'}}}}, '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}}
  post:
    operationId: postComunidadPublicacionesByIdComentarios
    tags: [Comunidad]
    summary: Comenta una publicacion accesible
    description: Si la publicacion tiene spoiler estructurado y se omite `Spoiler`, el comentario persiste y devuelve el rango y libro efectivos heredados. Un contexto explicito debe usar ese mismo libro y abarcar el rango del padre; no se admiten antologias ni libros alternativos. Esta validacion no revela progreso de otras personas.
    x-functional-error-codes:
      invalid_comment_spoiler: "400: estructura de spoiler invalida o falta libro efectivo. Corregir el cuerpo."
      invalid_comment_spoiler_range: "400: rango de paginas invalido. Corregir el cuerpo."
      invalid_comment_spoiler_chapter: "400: capitulo inexistente o ajeno al libro efectivo. Corregir el cuerpo."
      comment_spoiler_incompatible_with_post: "400: libro, antologia o rango explicito incompatible con el spoiler de la publicacion. Mantener el contexto heredado o usar un rango que abarque al del padre."
    parameters: [{name: id, in: path, required: true, schema: {type: integer, minimum: 1}}]
    requestBody: {required: true, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/CommunityCommentCreateRequest'}}}}
    responses: {'201': {description: Comentario creado, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/CommentCreatedResponse'}}}}, '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}}
/comunidad/publicaciones/{id}/comentarios/{comment_id}:
  patch:
    operationId: patchComunidadPublicacionesByIdComentariosByCommentId
    tags: [Comunidad]
    summary: Edita un comentario propio de la publicacion indicada
    parameters: [{name: id, in: path, required: true, schema: {type: integer, minimum: 1}}, {name: comment_id, in: path, required: true, schema: {type: integer, minimum: 1}}]
    requestBody: {required: true, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/CommunityCommentEditRequest'}}}}
    responses: {'200': {description: Comentario editado y auditado, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/CommunityMutationResponse'}}}}, '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}}
  delete:
    operationId: deleteComunidadPublicacionesByIdComentariosByCommentId
    tags: [Comunidad]
    summary: Elimina logicamente un comentario propio de la publicacion indicada
    parameters: [{name: id, in: path, required: true, schema: {type: integer, minimum: 1}}, {name: comment_id, in: path, required: true, schema: {type: integer, minimum: 1}}]
    responses: {'200': {description: Comentario eliminado y auditado, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/CommunityMutationResponse'}}}}, '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}}
/comunidad/publicaciones/{id}/reacciones:
  put:
    operationId: putComunidadPublicacionesByIdReacciones
    tags: [Comunidad]
    summary: Crea o actualiza una reaccion propia
    parameters: [{name: id, in: path, required: true, schema: {type: integer, minimum: 1}}]
    requestBody: {required: true, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/CommunityReactionRequest'}}}}
    responses: {'201': {description: Reaccion guardada, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/CommunityReactionResponse'}}}}, '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}}
/clubes-lectura/{id}:
  get:
    operationId: getClubesLecturaById
    tags: [ClubesLectura]
    summary: Obtiene el detalle y miembros paginados de un club
    description: Un club cerrado exige ser miembro o propietario; el detalle conserva el total de miembros en Métricas aunque MiembrosDetalle esté paginado.
    parameters: [{name: id, in: path, required: true, schema: {type: integer, minimum: 1}}, {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 100, default: 20}}, {name: cursorId, in: query, schema: {type: integer, minimum: 1}}]
    responses:
      '200': {description: Detalle del club y página de miembros activos, content: {application/json: {schema: {type: object, required: [success, Club], properties: {success: {type: boolean}, Club: {$ref: '../../openapi.yaml#/components/schemas/ClubDetail'}}}}}}
      '400': {$ref: '../../openapi.yaml#/components/responses/BadRequest'}
      '403': {$ref: '../../openapi.yaml#/components/responses/Forbidden'}
      '404': {$ref: '../../openapi.yaml#/components/responses/NotFound'}
  patch:
    operationId: patchClubesLecturaById
    tags: [ClubesLectura]
    summary: Edita el club propio
    description: Solo el propietario puede modificar nombre, descripción o visibilidad.
    parameters: [{name: id, in: path, required: true, schema: {type: integer, minimum: 1}}]
    requestBody: {required: true, content: {application/json: {schema: {type: object, properties: {Nombre: {type: string, minLength: 2, maxLength: 150}, DescripcionMarkdown: {type: [string, 'null']}, Visibilidad: {type: string, enum: [abierto, cerrado]}}}}}}
    responses:
      '200': {description: Club actualizado, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/SuccessResponse'}}}}
      '400': {$ref: '../../openapi.yaml#/components/responses/BadRequest'}
      '403': {$ref: '../../openapi.yaml#/components/responses/Forbidden'}
      '404': {$ref: '../../openapi.yaml#/components/responses/NotFound'}
  delete:
    operationId: deleteClubesLecturaById
    tags: [ClubesLectura]
    summary: Elimina lógicamente el club propio
    description: Conserva miembros, chat e histórico, pero revoca el acceso hasta una restauración explícita.
    parameters: [{name: id, in: path, required: true, schema: {type: integer, minimum: 1}}]
    responses:
      '200': {description: Club eliminado, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/ResolutionStateResponse'}}}}
      '403': {$ref: '../../openapi.yaml#/components/responses/Forbidden'}
      '404': {$ref: '../../openapi.yaml#/components/responses/NotFound'}
      '409': {$ref: '../../openapi.yaml#/components/responses/Conflict'}
/clubes-lectura/{id}/unirse:
  post:
    operationId: postClubesLecturaByIdUnirse
    tags: [ClubesLectura]
    summary: Se une idempotentemente a un club abierto
    x-functional-error-codes:
      club_access_unavailable: "404: club no disponible por una causa no enumerable. Retirar la vista y refrescar bandejas o descubrimiento."
      club_request_or_invitation_required: "403: club cerrado accesible; mostrar el flujo de solicitud o invitacion."
      club_membership_limit_reached: "409: limite de tres clubes activos. Mostrar mensaje de producto."
    description: Se rechaza para clubes cerrados y cuando el usuario ya tiene tres membresías activas.
    parameters: [{name: id, in: path, required: true, schema: {type: integer, minimum: 1}}]
    responses:
      '200': {description: Membresía activa, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/SuccessResponse'}}}}
      '403': {$ref: '../../openapi.yaml#/components/responses/Forbidden'}
      '404': {$ref: '../../openapi.yaml#/components/responses/NotFound'}
      '409': {$ref: '../../openapi.yaml#/components/responses/Conflict'}
/clubes-lectura/{id}/solicitudes:
  get:
    operationId: getClubesLecturaByIdSolicitudes
    tags: [ClubesLectura]
    summary: Lista solicitudes de acceso del club por cursor
    description: Solo propietario o moderador activo. No expone solicitantes afectados por bloqueo bilateral ni solicitudes de un club eliminado.
    x-functional-error-codes:
      invalid_club_inbox_limit: "400: limit debe estar entre 1 y 100."
      invalid_club_cursor: "400: cursorId no es válido."
      invalid_club_inbox_state: "400: estado debe ser pendiente, aceptada, rechazada, cancelada o todas."
      club_access_unavailable: "404: club no disponible por una causa no enumerable. Retirar la vista y refrescar la bandeja."
      club_moderator_required: "403: se requiere rol activo de propietario o moderador."
    parameters: [{name: id, in: path, required: true, schema: {type: integer, minimum: 1}}, {name: estado, in: query, schema: {type: string, enum: [pendiente, aceptada, rechazada, cancelada, todas], default: pendiente}}, {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 100, default: 20}}, {name: cursorId, in: query, schema: {type: integer, minimum: 1}}]
    responses:
      '200': {description: Solicitudes del club ordenadas por Id descendente, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/ClubJoinRequestListResponse'}}}}
      '400': {$ref: '../../openapi.yaml#/components/responses/BadRequest'}
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '403': {$ref: '../../openapi.yaml#/components/responses/Forbidden'}
      '404': {$ref: '../../openapi.yaml#/components/responses/NotFound'}
  post:
    operationId: postClubesLecturaByIdSolicitudes
    tags: [ClubesLectura]
    summary: Solicita acceso a un club cerrado
    x-functional-error-codes:
      club_access_unavailable: "404: club no disponible por una causa no enumerable. Retirar la vista y refrescar descubrimiento."
      club_is_open: "409: el club es abierto. Refrescar el detalle y usar unirse."
      user_blocked: "403: existe un bloqueo bilateral sin revelar su direccion. Mostrar mensaje de producto."
      club_already_member: "409: ya existe membresia activa. Refrescar clubes propios."
      duplicate_club_join_request: "409: ya existe solicitud pendiente. Refrescar la bandeja propia."
    parameters: [{name: id, in: path, required: true, schema: {type: integer, minimum: 1}}]
    requestBody: {content: {application/json: {schema: {type: object, properties: {Mensaje: {type: string, maxLength: 1000}}}}}}
    responses:
      '201': {description: Solicitud creada, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/SuccessResponse'}}}}
      '403': {$ref: '../../openapi.yaml#/components/responses/Forbidden'}
      '404': {$ref: '../../openapi.yaml#/components/responses/NotFound'}
      '409': {$ref: '../../openapi.yaml#/components/responses/Conflict'}
/chat/conversaciones/directa:
  post:
    operationId: postChatConversacionesDirecta
    tags: [Chat]
    summary: Crea o recupera una conversacion directa permitida
    requestBody:
      required: true
      content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/UserTargetRequest'}}}
    responses:
      '201': {description: Conversacion creada o recuperada, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/ConversationCreatedResponse'}}}}
      '403': {description: 'No hay amistad ni permiso de mensajes, o existe bloqueo', content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/ErrorResponse'}}}}
/chat/directos/elegibilidad/{user_id}:
  get:
    operationId: getChatDirectosElegibilidadByUserId
    tags: [Chat]
    summary: Consulta si se puede iniciar un directo con una persona
    description: No revela quién bloqueó a quién. El resultado puede cambiar antes de crear la conversación; la creación sigue siendo la autoridad final.
    parameters: [{name: user_id, in: path, required: true, schema: {type: integer, minimum: 1}}]
    responses:
      '200': {description: Elegibilidad actual, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/DirectEligibilityResponse'}}}}
      '400': {$ref: '../../openapi.yaml#/components/responses/BadRequest'}
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
/chat/conversaciones/{id}/mensajes:
  get:
    operationId: getChatConversacionesByIdMensajes
    tags: [Chat]
    summary: Historial actual de mensajes
    description: Devuelve hasta `limit` mensajes ordenados de forma ascendente. `beforeId` es cursor keyset hacia mensajes anteriores.
    parameters:
    - {name: id, in: path, required: true, schema: {type: integer, minimum: 1}}
    - {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 100, default: 50}}
    - {name: beforeId, in: query, schema: {type: integer, minimum: 1}}
    responses:
      '200': {description: Mensajes de una conversacion accesible, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/MessageListResponse'}}}}
      '403': {description: No es participante activo, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/ErrorResponse'}}}}
  post:
    operationId: postChatConversacionesByIdMensajes
    tags: [Chat]
    summary: Envia un mensaje Markdown
    description: ClientMessageId UUID es obligatorio y hace la escritura idempotente por conversacion/remitente.
    parameters: [{name: id, in: path, required: true, schema: {type: integer, minimum: 1}}]
    requestBody: {required: true, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/ChatMessageCreateRequest'}}}}
    responses:
      '201': {description: Mensaje persistido, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/ChatMessageCreateResponse'}}}}
      '400': {description: Cuerpo obligatorio, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/ErrorResponse'}}}}
      '403': {description: No es participante activo, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/ErrorResponse'}}}}
/chat/conversaciones/{id}/leer:
  post:
    operationId: postChatConversacionesByIdLeer
    tags: [Chat]
    summary: Actualiza lectura monotona
    parameters: [{name: id, in: path, required: true, schema: {type: integer, minimum: 1}}]
    requestBody: {required: true, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/ChatReadRequest'}}}}
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200':
        description: Lectura actualizada sin retroceder con cursor y no leidos derivados
        content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/SuccessResponse'}}}
/chat/conversaciones/{id}/mensajes/{message_id}:
  parameters: [{name: id, in: path, required: true, schema: {type: integer, minimum: 1}}, {name: message_id, in: path, required: true, schema: {type: integer, minimum: 1}}]
  patch:
    operationId: patchChatConversacionesByIdMensajesByMessageId
    tags: [Chat]
    summary: Edita un mensaje propio durante quince minutos
    requestBody: {required: true, content: {application/json: {schema: {type: object, required: [CuerpoMarkdown], properties: {CuerpoMarkdown: {type: string, minLength: 1, maxLength: 4000}}}}}}
    responses: {'200': {description: Mensaje actualizado, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/SuccessResponse'}}}}, '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}}
  delete:
    operationId: deleteChatConversacionesByIdMensajesByMessageId
    tags: [Chat]
    summary: Hace tombstone de un mensaje propio durante quince minutos
    responses: {'200': {description: Mensaje eliminado logicamente, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/SuccessResponse'}}}}, '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}}
/chat/conversaciones/{id}/mensajes/{message_id}/ocultar:
  post:
    operationId: postChatConversacionesByIdMensajesByMessageIdOcultar
    tags: [Chat]
    summary: Oculta un mensaje de club para propietarios o moderadores
    parameters: [{name: id, in: path, required: true, schema: {type: integer}}, {name: message_id, in: path, required: true, schema: {type: integer}}]
    responses: {'200': {description: Mensaje ocultado, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/SuccessResponse'}}}}, '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}}
/chat/conversaciones/{id}/mensajes/{message_id}/reaccion:
  put:
    operationId: putChatConversacionesByIdMensajesByMessageIdReaccion
    tags: [Chat]
    summary: Guarda una reaccion propia por mensaje
    parameters: [{name: id, in: path, required: true, schema: {type: integer}}, {name: message_id, in: path, required: true, schema: {type: integer}}]
    requestBody: {required: true, content: {application/json: {schema: {type: object, required: [Tipo], properties: {Tipo: {type: string, enum: [me_gusta, risa, sorpresa, triste, apoyo]}}}}}}
    responses: {'200': {description: Reaccion actualizada, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/SuccessResponse'}}}}, '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}}
/chat/conversaciones/{id}/mensajes/buscar:
  get:
    operationId: getChatConversacionesByIdMensajesBuscar
    tags: [Chat]
    summary: Busca mensajes accesibles por cursor keyset
    parameters: [{name: id, in: path, required: true, schema: {type: integer}}, {name: q, in: query, required: true, schema: {type: string, minLength: 2}}, {name: beforeId, in: query, schema: {type: integer}}, {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 100, default: 30}}]
    responses: {'200': {description: Resultados de busqueda, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/MessageListResponse'}}}}, '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}}
/chat/clubes/{id}:
  post:
    operationId: postChatClubesById
    tags: [Chat]
    summary: Prepara o recupera el chat de un club
    parameters: [{name: id, in: path, required: true, schema: {type: integer, minimum: 1}}]
    responses:
      '200': {description: Conversacion de club disponible, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/ConversationCreatedResponse'}}}}
      '403': {description: Se requiere membresia activa, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/ErrorResponse'}}}}
/clubes-lectura/{id}/invitaciones:
  post:
    operationId: postClubesLecturaByIdInvitaciones
    tags: [ClubesLectura]
    summary: Invita a una persona al club
    x-functional-error-codes:
