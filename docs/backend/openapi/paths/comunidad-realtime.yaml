  post: {operationId: postClubesLecturaByIdDebates, tags: [ClubesLectura], summary: Crea un debate persistente, description: Los debates no tienen edición ni borrado expuestos. El spoiler exige que LecturaId o HitoId resuelva a una lectura de libro., parameters: [{name: id, in: path, required: true, schema: {type: integer, minimum: 1}}], requestBody: {required: true, content: {application/json: {schema: {type: object, required: [Titulo, ContenidoMarkdown], properties: {Titulo: {type: string, minLength: 1, maxLength: 200}, ContenidoMarkdown: {type: string, minLength: 1, maxLength: 20000}, LecturaId: {type: integer, minimum: 1}, HitoId: {type: integer, minimum: 1}, Spoiler: {$ref: '../../openapi.yaml#/components/schemas/ClubSpoiler'}}}}}}, responses: {'201': {description: Debate creado, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/ClubMutationResponse'}}}}, '400': {$ref: '../../openapi.yaml#/components/responses/BadRequest'}, '403': {$ref: '../../openapi.yaml#/components/responses/Forbidden'}}}
/clubes-lectura/{id}/debates/{debateId}:
