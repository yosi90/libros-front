    operationId: postChatGroups
    tags: [Chat]
    summary: Crea un grupo privado con amistades elegibles
    x-functional-error-codes: {chat_group_title_invalid: '400: título de 2 a 150 caracteres.', chat_group_participants_required: '400: se requiere al menos una amistad.', chat_group_participants_invalid: '400: identificadores inválidos.', chat_group_participants_limit: '400|409: máximo 50 participantes activos contando al creador.', chat_group_participant_not_eligible: '409: solo amistades activas, disponibles y sin bloqueo.'}
