    parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
    requestBody: {required: true, content: {application/json: {schema: {type: object, required: [Titulo], properties: {Titulo: {type: string, minLength: 2, maxLength: 150}}}}}}
