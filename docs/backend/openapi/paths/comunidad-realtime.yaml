  post: {operationId: postClubesLecturaByIdDebatesByDebateId, tags: [ClubesLectura], summary: Comenta un debate, description: Los comentarios no tienen edición ni borrado expuestos y heredan el spoiler del debate cuando no declaran uno., parameters: [{name: id, in: path, required: true, schema: {type: integer, minimum: 1}}, {name: debateId, in: path, required: true, schema: {type: integer, minimum: 1}}], requestBody: {required: true, content: {application/json: {schema: {type: object, required: [ContenidoMarkdown], properties: {ContenidoMarkdown: {type: string, minLength: 1, maxLength: 4000}, Spoiler: {$ref: '../../openapi.yaml#/components/schemas/ClubSpoiler'}}}}}}, responses: {'201': {description: Comentario creado, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/ClubMutationResponse'}}}}, '400': {$ref: '../../openapi.yaml#/components/responses/BadRequest'}, '403': {$ref: '../../openapi.yaml#/components/responses/Forbidden'}, '404': {$ref: '../../openapi.yaml#/components/responses/NotFound'}}}
/moderacion/comunidad/denuncias:
  get:
    operationId: getModeracionComunidadDenuncias
    tags: [Moderacion]
    summary: Lista grupos de denuncias de contenido comunitario
    description: Requiere rol moderador o administrador. Cada grupo incluye contexto moderable mínimo generado por backend y nunca crea por sí mismo una sanción de cuenta.
    parameters: [{name: estado, in: query, schema: {type: string, enum: [pendiente, aceptada, rechazada, todos], default: pendiente}}]
    responses:
      '200': {description: Grupos de denuncias, content: {application/json: {schema: {type: object, required: [success, Grupos], properties: {success: {type: boolean}, Grupos: {type: array, items: {$ref: '../../openapi.yaml#/components/schemas/CommunityReportGroup'}}}}}}}
      '400': {$ref: '../../openapi.yaml#/components/responses/BadRequest'}
      '403': {$ref: '../../openapi.yaml#/components/responses/Forbidden'}
/moderacion/comunidad/denuncias/{id}/resolver:
  post: &resolveCommunityReport
    operationId: postModeracionComunidadDenunciasByIdResolver
    tags: [Moderacion]
    summary: Resuelve un grupo de denuncias comunitarias
    description: Requiere rol moderador o administrador. La medida nunca sanciona automáticamente la cuenta. Para mensaje y club admite ocultar/restaurar mensaje o retirar/restaurar el club del descubrimiento.
    x-functional-error-codes:
      moderator_required: "403: solo moderador o administrador."
      invalid_content_report_resolution: "400: Estado debe ser aceptada o rechazada."
      invalid_content_report_measure: "400: medida desconocida o incompatible con el tipo denunciado."
      community_report_group_not_found: "404: grupo inexistente."
      reported_content_not_found: "404: la entidad denunciada ya no existe."
      community_report_group_already_resolved: "409: otra resolución ya reclamó o cerró el grupo; no se repite la medida ni las notificaciones."
    parameters: [{name: id, in: path, required: true, schema: {type: integer, minimum: 1}}]
    requestBody: {required: true, content: {application/json: {schema: {type: object, required: [Estado], properties: {Estado: {type: string, enum: [aceptada, rechazada]}, Comentario: {type: string, maxLength: 1000}, Medida: {type: string, enum: [ninguna, mensaje_ocultado, mensaje_restaurado, club_retirado_descubrimiento, club_restaurado_descubrimiento]}}}}}}
    responses:
      '200': {description: Grupo resuelto, content: {application/json: {schema: {type: object, properties: {success: {type: boolean}, Id: {type: integer}, Estado: {type: string, enum: [aceptada, rechazada]}}}}}}
