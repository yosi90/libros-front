    responses: {'200': {description: Preferencias guardadas, content: {application/json: {schema: {$ref: '../../openapi.yaml#/components/schemas/ChatFloatingPreferencesResponse'}}}}, '409': {$ref: '../../openapi.yaml#/components/responses/Conflict'}}
