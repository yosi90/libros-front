/estado_localizacion/catalogo:
  get:
    tags:
    - EstadoLocalizacion
    summary: Lista catalogo de estados de localizacion
    responses:
      '200':
        $ref: '../../openapi.yaml#/components/responses/FlexibleList'
  post:
    tags:
    - EstadoLocalizacion
    summary: Crea estado catalogo
    requestBody:
      $ref: '../../openapi.yaml#/components/requestBodies/NameOnly'
    responses:
      '201':
        $ref: '../../openapi.yaml#/components/responses/FlexibleObject'
  patch:
    tags:
    - EstadoLocalizacion
    summary: Actualiza estado catalogo
    requestBody:
      $ref: '../../openapi.yaml#/components/requestBodies/IdName'
    responses:
      '200':
        $ref: '../../openapi.yaml#/components/responses/FlexibleObject'
/estado_localizacion/localizacion/{id}:
  get:
    tags:
    - EstadoLocalizacion
    summary: Lista estados de una localizacion
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    responses:
      '200':
        $ref: '../../openapi.yaml#/components/responses/FlexibleList'
  delete:
    tags:
    - EstadoLocalizacion
    summary: Elimina estado de localizacion por id de relacion
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    responses:
      '200':
        $ref: '../../openapi.yaml#/components/responses/Deleted'
/estado_localizacion/localizacion:
  post:
    tags:
    - EstadoLocalizacion
    summary: Agrega estado a localizacion
    requestBody:
      $ref: '../../openapi.yaml#/components/requestBodies/LocationStateWrite'
    responses:
      '201':
        $ref: '../../openapi.yaml#/components/responses/FlexibleObject'
