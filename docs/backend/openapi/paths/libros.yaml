/libros:
  get:
    operationId: getLibros
    tags:
    - Libros
    summary: Lista libros
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200':
        description: Lista de libros
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../../openapi.yaml#/components/schemas/BookSummary'
/libros/{id_libro}:
  get:
    operationId: getLibrosByIdLibro
    tags:
    - Libros
    summary: Detalle completo de libro
    parameters:
    - $ref: '../../openapi.yaml#/components/parameters/IdLibro'
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200':
        description: Libro completo
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/BookDetail'
/libros/{id_libro}/personajes/orden:
  get:
    operationId: getLibrosByIdLibroPersonajesOrden
    tags:
    - Libros
    summary: Orden ligero de personajes del libro
    description: Devuelve la lista minima de personajes ordenada por las reglas de agrupacion/nombre del libro.
    parameters:
    - $ref: '../../openapi.yaml#/components/parameters/IdLibro'
    responses:
      '200':
        description: Personajes ordenados
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../../openapi.yaml#/components/schemas/CharacterOrderSummary'
      '404':
        $ref: '../../openapi.yaml#/components/responses/NotFound'
/libros/leidos:
  get:
    operationId: getLibrosLeidos
    tags:
    - Libros
    summary: Cuenta libros leidos
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200':
        $ref: '../../openapi.yaml#/components/responses/MetricObject'
/libros/no_leidos:
  get:
    operationId: getLibrosNoLeidos
    tags:
    - Libros
    summary: Cuenta libros no leidos
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200':
        $ref: '../../openapi.yaml#/components/responses/MetricObject'
/libros/sin_leer:
  get:
    operationId: getLibrosSinLeer
    tags:
    - Libros
    summary: Libro con mas tiempo sin leer
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200':
        description: Libro o null
        content:
          application/json:
            schema:
              anyOf:
              - $ref: '../../openapi.yaml#/components/schemas/BookStale'
              - type: 'null'
/libros/por_comprar:
  get:
    operationId: getLibrosPorComprar
    tags:
    - Libros
    summary: Libros por comprar
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200':
        description: Lista de libros
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../../openapi.yaml#/components/schemas/IdName'
/libros/mas_rapido:
  get:
    operationId: getLibrosMasRapido
    tags:
    - Libros
    summary: Libro leido mas rapido
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200':
        description: Libro o null
        content:
          application/json:
            schema:
              anyOf:
              - $ref: '../../openapi.yaml#/components/schemas/FastRead'
              - type: 'null'
/libros/top_mas_rapido:
  get:
    operationId: getLibrosTopMasRapido
    tags:
    - Libros
    summary: Top libros leidos mas rapido
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200':
        description: Lista top
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../../openapi.yaml#/components/schemas/FastRead'
/libros/historial_leidos:
  get:
    operationId: getLibrosHistorialLeidos
    tags:
    - Libros
    summary: Historial mensual de libros leidos
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200':
        description: Historial
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../../openapi.yaml#/components/schemas/MonthlyCount'
/libros/promedio_compra_lectura:
  get:
    operationId: getLibrosPromedioCompraLectura
    tags:
    - Libros
    summary: Promedio dias entre compra y lectura
    responses:
      '401': {$ref: '../../openapi.yaml#/components/responses/Unauthorized'}
      '200':
        description: Promedio
        content:
          application/json:
            schema:
              type: object
              properties:
                promedio_dias:
                  type:
                  - number
                  - 'null'
