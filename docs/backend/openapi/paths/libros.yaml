/libros:
  get:
    tags:
    - Libros
    summary: Lista libros
    responses:
      '200':
        description: Lista de libros
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../../openapi.yaml#/components/schemas/BookSummary'
  post:
    tags:
    - Libros
    summary: Crea libro
    requestBody:
      $ref: '../../openapi.yaml#/components/requestBodies/BookWriteFlexible'
    responses:
      '201':
        description: Libro creado
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/BookSummary'
  patch:
    tags:
    - Libros
    summary: Actualiza libro
    description: Si cambia entre autoconclusivo y saga, migra entidades narrativas propias del libro entre tablas libro_*
      y saga_*. Al sacar un libro de una saga, solo migra filas cuyo id_libro_origen sea ese libro; no arrastra entidades
      heredadas.
    requestBody:
      $ref: '../../openapi.yaml#/components/requestBodies/BookWriteFlexible'
    responses:
      '200':
        description: Libro actualizado
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/BookSummary'
/libros/{id_libro}:
  get:
    tags:
    - Libros
    summary: Detalle completo de libro
    parameters:
    - $ref: '../../openapi.yaml#/components/parameters/IdLibro'
    responses:
      '200':
        description: Libro completo
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/BookDetail'
/libros/{id_libro}/personajes/orden:
  get:
    tags:
    - Libros
    summary: Orden ligero de personajes del libro
    description: Devuelve la lista minima de personajes ordenada por las reglas de agrupacion/nombre del libro.
    parameters:
    - $ref: '../../openapi.yaml#/components/parameters/IdLibro'
    responses:
      '200':
        description: Personajes ordenados
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../../openapi.yaml#/components/schemas/CharacterOrderSummary'
      '404':
        $ref: '../../openapi.yaml#/components/responses/NotFound'
/libros/{id_libro}/idiomas:
  post:
    tags:
    - Libros
    summary: Anade idiomas a un libro
    description: Requiere admin o moderador. Operacion idempotente; no elimina idiomas existentes.
    parameters:
    - $ref: '../../openapi.yaml#/components/parameters/IdLibro'
    requestBody:
      $ref: '../../openapi.yaml#/components/requestBodies/BookLanguagesWrite'
    responses:
      '200':
        $ref: '../../openapi.yaml#/components/responses/BookLanguagesUpdated'
      '400':
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../../openapi.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../../openapi.yaml#/components/responses/NotFound'
  patch:
    tags:
    - Libros
    summary: Anade idiomas a un libro
    description: Requiere admin o moderador. Operacion idempotente; no elimina idiomas existentes.
    parameters:
    - $ref: '../../openapi.yaml#/components/parameters/IdLibro'
    requestBody:
      $ref: '../../openapi.yaml#/components/requestBodies/BookLanguagesWrite'
    responses:
      '200':
        $ref: '../../openapi.yaml#/components/responses/BookLanguagesUpdated'
      '400':
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../../openapi.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../../openapi.yaml#/components/responses/NotFound'
/libros/wiki:
  patch:
    tags:
    - Libros
    summary: Actualiza wiki de libro
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - Id
            - Wiki
            properties:
              Id:
                type: integer
              Wiki:
                type: string
    responses:
      '200':
        $ref: '../../openapi.yaml#/components/responses/Message'
/libros/leidos:
  get:
    tags:
    - Libros
    summary: Cuenta libros leidos
    responses:
      '200':
        $ref: '../../openapi.yaml#/components/responses/MetricObject'
/libros/no_leidos:
  get:
    tags:
    - Libros
    summary: Cuenta libros no leidos
    responses:
      '200':
        $ref: '../../openapi.yaml#/components/responses/MetricObject'
/libros/sin_leer:
  get:
    tags:
    - Libros
    summary: Libro con mas tiempo sin leer
    responses:
      '200':
        description: Libro o null
        content:
          application/json:
            schema:
              anyOf:
              - $ref: '../../openapi.yaml#/components/schemas/BookStale'
              - type: 'null'
/libros/por_comprar:
  get:
    tags:
    - Libros
    summary: Libros por comprar
    responses:
      '200':
        description: Lista de libros
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../../openapi.yaml#/components/schemas/IdName'
/libros/mas_rapido:
  get:
    tags:
    - Libros
    summary: Libro leido mas rapido
    responses:
      '200':
        description: Libro o null
        content:
          application/json:
            schema:
              anyOf:
              - $ref: '../../openapi.yaml#/components/schemas/FastRead'
              - type: 'null'
/libros/top_mas_rapido:
  get:
    tags:
    - Libros
    summary: Top libros leidos mas rapido
    responses:
      '200':
        description: Lista top
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../../openapi.yaml#/components/schemas/FastRead'
/libros/historial_leidos:
  get:
    tags:
    - Libros
    summary: Historial mensual de libros leidos
    responses:
      '200':
        description: Historial
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../../openapi.yaml#/components/schemas/MonthlyCount'
/libros/promedio_compra_lectura:
  get:
    tags:
    - Libros
    summary: Promedio dias entre compra y lectura
    responses:
      '200':
        description: Promedio
        content:
          application/json:
            schema:
              type: object
              properties:
                promedio_dias:
                  type:
                  - number
                  - 'null'
