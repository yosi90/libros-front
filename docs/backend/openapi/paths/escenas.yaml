    operationId: postEscenasCapitulosByIdCapitulo
    tags:
    - Escenas
    summary: Crea o reutiliza escena en un capitulo normal
    parameters:
    - name: id_capitulo
      in: path
      required: true
      schema:
        type: integer
    requestBody:
      $ref: '../../openapi.yaml#/components/requestBodies/SceneWrite'
    responses:
