/escenas/{id_escena}:
  get:
    operationId: getEscenasByIdEscena
    tags:
    - Escenas
    summary: Detalle de escena
    parameters:
    - name: id_escena
      in: path
      required: true
      schema:
        type: integer
    responses:
      '200':
        description: Escena
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/Scene'
      '404':
        $ref: '../../openapi.yaml#/components/responses/Message'
  put:
    operationId: putEscenasByIdEscena
    tags:
    - Escenas
    summary: Actualiza escena completa
    parameters:
    - name: id_escena
      in: path
      required: true
      schema:
        type: integer
    requestBody:
      $ref: '../../openapi.yaml#/components/requestBodies/SceneWrite'
    responses:
      '200':
        description: Escena actualizada
        content:
          application/json:
            schema:
              $ref: '../../openapi.yaml#/components/schemas/Scene'
      '400':
        $ref: '../../openapi.yaml#/components/responses/Message'
      '403':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
      '404':
        $ref: '../../openapi.yaml#/components/responses/Message'
  delete:
    operationId: deleteEscenasByIdEscena
    tags:
    - Escenas
    summary: Borra logicamente una escena
    parameters:
    - name: id_escena
      in: path
      required: true
      schema:
        type: integer
    responses:
      '200':
        $ref: '../../openapi.yaml#/components/responses/Message'
      '403':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
      '404':
        $ref: '../../openapi.yaml#/components/responses/Message'
/escenas/capitulos/{id_capitulo}:
