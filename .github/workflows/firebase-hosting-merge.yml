name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Build app
        run: npm run build
      - name: Authenticate to Google Cloud
        id: google-auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_YOSIFTWARE_LIBROS }}
          create_credentials_file: true
          export_environment_variables: true
      - name: Deploy to Firebase Hosting
        shell: bash
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.google-auth.outputs.credentials_file_path }}
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            echo "Firebase deploy attempt $attempt/3"
            set +e
            output="$(npx firebase-tools@15.21.0 deploy --only hosting --project yosiftware-libros 2>&1)"
            status=$?
            set -e

            printf '%s\n' "$output"

            if [ "$status" -eq 0 ]; then
              exit 0
            fi

            if printf '%s\n' "$output" | grep -q 'is the current active version'; then
              echo "Firebase reports the target version is already active; treating deploy as successful."
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 10))
            else
              exit "$status"
            fi
          done
