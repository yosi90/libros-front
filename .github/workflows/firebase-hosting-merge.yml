name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Build app
        run: npm run build
      - name: Authenticate to Google Cloud
        id: google-auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_YOSIFTWARE_LIBROS }}
          create_credentials_file: true
          export_environment_variables: true
          project_id: yosiftware-libros
      - name: Verify Firebase credentials
        shell: bash
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.google-auth.outputs.credentials_file_path }}
        run: |
          set -euo pipefail

          if [ ! -s "$GOOGLE_APPLICATION_CREDENTIALS" ]; then
            echo "Google credentials file was not created or is empty."
            exit 1
          fi

          node -e "const fs = require('fs'); const file = process.env.GOOGLE_APPLICATION_CREDENTIALS; const json = JSON.parse(fs.readFileSync(file, 'utf8')); if (!json.client_email || !json.project_id) throw new Error('Invalid service account JSON'); console.log('Firebase credentials file is available for project ' + json.project_id);"
      - name: Verify Google auth token
        shell: bash
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.google-auth.outputs.credentials_file_path }}
        run: |
          set -euo pipefail

          npm exec --yes --package google-auth-library -- node -e "const { GoogleAuth } = require('google-auth-library'); new GoogleAuth({ scopes: ['https://www.googleapis.com/auth/cloud-platform'] }).getAccessToken().then(() => console.log('Google auth token generated successfully.'))"
      - name: Deploy to Firebase Hosting
        shell: bash
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.google-auth.outputs.credentials_file_path }}
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            echo "Firebase deploy attempt $attempt/3"
            set +e
            if [ "$attempt" -eq 1 ]; then
              output="$(npx -y firebase-tools@15.22.1 deploy --only hosting --project yosiftware-libros --non-interactive --debug 2>&1)"
            else
              output="$(npx -y firebase-tools@15.22.1 deploy --only hosting --project yosiftware-libros --non-interactive 2>&1)"
            fi
            status=$?
            set -e

            printf '%s\n' "$output"

            if [ "$status" -eq 0 ]; then
              exit 0
            fi

            if printf '%s\n' "$output" | grep -q 'is the current active version'; then
              echo "Firebase reports the target version is already active; treating deploy as successful."
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 10))
            else
              exit "$status"
            fi
          done
